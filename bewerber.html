<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redline Bewerber Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #DA2135;
            --color-primary-light: #E84A5C;
            --color-primary-dark: #A5192A;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #DA2135;
            --color-info: #3b82f6;
            --bg-dark: #1A1A1A;
            --bg-darker: #111111;
            --bg-card: #2D2D2D;
            --bg-hover: #3a3a3a;
            --text-primary: #FFFFFF;
            --text-secondary: #d4d4d4;
            --text-muted: #8a8a8a;
            --border-color: #3a3a3a;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --gradient-spectrum: linear-gradient(135deg, #A5192A 0%, #DA2135 50%, #E84A5C 100%);
            --gradient-deep: linear-gradient(135deg, #DA2135 0%, #8A1120 100%);
        }

        body.light-mode {
            --bg-dark: #FFFFFF;
            --bg-darker: #F5F5F5;
            --bg-card: #FFFFFF;
            --bg-hover: #F0F0F0;
            --text-primary: #1A1A1A;
            --text-secondary: #2D2D2D;
            --text-muted: #6b6b6b;
            --border-color: #e5e5e5;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--bg-darker);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .sidebar-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 10px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            user-select: none;
            font-size: 14px;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--gradient-spectrum);
            color: white;
            border-left-color: transparent;
            font-weight: 600;
        }

        .theme-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--color-primary);
            color: #fff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
        }

        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }

        .sync-dot.syncing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-filter {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .client-filter:hover {
            border-color: var(--color-primary);
        }

        .tabs {
            display: flex;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
            overflow-x: auto;
            gap: 20px;
        }

        .tab {
            padding: 15px 0;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .kpi-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .kpi-change {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .kpi-change.positive {
            color: var(--color-success);
        }

        .kpi-change.negative {
            color: var(--color-danger);
        }

        .kpi-change.neutral {
            color: var(--text-muted);
        }

        .alert-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }

        .alert-item {
            background: var(--bg-darker);
            border-left: 4px solid var(--color-warning);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .alert-item.critical {
            border-left-color: var(--color-danger);
        }

        .alert-item.good {
            border-left-color: var(--color-success);
            opacity: 0.6;
        }

        .alert-content {
            flex: 1;
        }

        .alert-customer {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .alert-funnel {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .alert-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .alert-days {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-danger);
            min-width: 50px;
            text-align: right;
        }

        .alert-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
            margin-right: 10px;
        }

        .alert-dot.critical {
            background: var(--color-danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .alert-dot.warning {
            background: var(--color-warning);
        }

        .alert-dot.good {
            background: var(--color-success);
        }

        .alert-dismiss {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            margin-left: 10px;
            transition: color 0.3s ease;
        }

        .alert-dismiss:hover {
            color: var(--color-danger);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-darker);
            padding: 15px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
        }

        th:hover {
            background: var(--bg-hover);
        }

        th.sortable:after {
            content: " \2191";
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        th.sortable:hover:after {
            opacity: 0.5;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tr:hover {
            background: var(--bg-hover);
        }

        tr.paused {
            opacity: 0.6;
            background: var(--bg-darker);
        }

        tr.filled {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .health-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .health-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .health-dot.good {
            background: var(--color-success);
        }

        .health-dot.warning {
            background: var(--color-warning);
        }

        .health-dot.danger {
            background: var(--color-danger);
        }

        .trend-arrow {
            font-size: 16px;
            font-weight: 700;
        }

        .trend-arrow.up {
            color: var(--color-success);
        }

        .trend-arrow.down {
            color: var(--color-danger);
        }

        .trend-arrow.stable {
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .status-paused {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }

        .status-filled {
            background: rgba(59, 130, 246, 0.2);
            color: var(--color-info);
        }

        .status-stopped {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-danger);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .btn.primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .btn.primary:hover {
            background: var(--color-primary-dark);
        }

        .btn.success {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .btn.success:hover {
            background: var(--color-success);
            color: white;
        }

        .btn.warning {
            background: rgba(245, 158, 11, 0.2);
            border-color: var(--color-warning);
            color: var(--color-warning);
        }

        .btn.warning:hover {
            background: var(--color-warning);
            color: white;
        }

        .btn.danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .btn.danger:hover {
            background: var(--color-danger);
            color: white;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 11px;
        }

        .campaign-counter {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-darker);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .counter-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .counter-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .counter-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            height: 400px;
        }

        .recent-applicants {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .applicant-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }

        .applicant-item:hover {
            background: var(--bg-hover);
        }

        .applicant-item:last-child {
            border-bottom: none;
        }

        .applicant-info {
            flex: 1;
        }

        .applicant-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .applicant-details {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .applicant-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .settings-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .setting-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .setting-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: block;
        }

        .setting-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input {
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(218, 33, 53, 0.08);
        }

        .input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cost-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .cost-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .cost-card:hover {
            border-color: var(--color-primary);
        }

        .cost-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .cost-campaign {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .cost-rating {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 10px;
        }

        .cost-rating.good {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .cost-rating.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }

        .cost-rating.bad {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .cost-row:last-child {
            border-bottom: none;
        }

        .cost-label {
            color: var(--text-muted);
        }

        .cost-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .instructions {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }

        .instruction-section {
            margin-bottom: 30px;
        }

        .instruction-section:last-child {
            margin-bottom: 0;
        }

        .instruction-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .instruction-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .code-block {
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--color-primary-light);
            margin: 10px 0;
            overflow-x: auto;
            user-select: all;
        }

        .copy-btn {
            display: inline-block;
            background: var(--color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            border: none;
            transition: background 0.3s ease;
            margin-top: 8px;
        }

        .copy-btn:hover {
            background: var(--color-primary-dark);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--text-primary);
        }

        @media (max-width: 1200px) {
            .sidebar {
                width: 200px;
                padding: 15px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .alert-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 15px;
                max-height: 60px;
                overflow: hidden;
            }

            .sidebar-nav {
                display: none;
            }

            .theme-toggle {
                position: static;
                margin-top: 10px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                flex-wrap: wrap;

    <script>
        const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzVJ7QUO8dOEbtxmql11OCjlmBI8Ene7CfTghoI2nvSnGvt-wpMpx3tkO6cDrNhR0OgtA/exec';

        let API_URL = DEFAULT_API_URL;
        let dashboardData = null;
        let campaignStatuses = {};
        let dismissedAlerts = {};
        let costSettings = {};
        let charts = {};
        let currentTab = 'overview';
        let currentClient = '';
        let customerProfiles = {};
        let healthFilter = 'all';
        let selectedDetailCustomer = '';
        let selectedDetailFunnel = '';
        let customerDetailMonthFrom = -1;
        let customerDetailMonthTo = -1;
        let manualApplicants = {};

        const TABS = [
            { id: 'overview', label: 'Übersicht' },
            { id: 'today', label: 'Heute' },
            { id: 'yesterday', label: 'Gestern' },
            { id: 'week', label: 'Woche' },
            { id: 'month', label: 'Monat' },
            { id: 'monthly', label: 'Monatsvergleich' },
            { id: 'campaigns', label: 'Kampagnen' },
            { id: 'costs', label: 'Kosten' },
            { id: 'customerDetail', label: 'Kundendetail' },
            { id: 'instructions', label: 'Anleitung' }
        ];

        function fixUmlauts(data) {
            const replacements = {
                'Ã¤': 'ä', 'Ã¶': 'ö', 'Ã¼': 'ü', 'Ã„': 'Ä', 'Ã–': 'Ö', 'Ãœ': 'Ü', 'ÃŸ': 'ß',
                'ä': 'ä', 'ö': 'ö', 'ü': 'ü', 'Ä': 'Ä', 'Ö': 'Ö', 'Ü': 'Ü',
                'Ã€': 'À', 'Ã©': 'é', 'Ã¨': 'è',
                '\u00c3\u00a4': 'ä', '\u00c3\u00b6': 'ö', '\u00c3\u00bc': 'ü',
                '\u00c3\u0084': 'Ä', '\u00c3\u0096': 'Ö', '\u00c3\u009c': 'Ü',
                '\u00c3\u009f': 'ß',
                'Ã\u009c': 'Ü', 'Ã\u009f': 'ß',
                'â€"': '\u2013', 'â€"': '\u2014', 'â€™': '\u2019', 'â€ž': '\u201E', 'â€œ': '\u201C',
                'Ã ': 'à', 'Ã¡': 'á', 'Ã¢': 'â', 'Ã£': 'ã', 'Ã§': 'ç', 'Ã±': 'ñ',
                'Ã®': 'î', 'Ã¯': 'ï', 'Ã´': 'ô', 'Ã¹': 'ù', 'Ãº': 'ú', 'Ã»': 'û'
            };

            const manualFixes = {
                'Sanitür': 'Sanitär',
                'sanitür': 'sanitär',
                'SaniTür': 'Sanitär',
                'SANITÜR': 'SANITÄR'
            };

            function fixStr(str) {
                if (typeof str !== 'string') return str;
                let result = str;

                result = result.replace(/\uFFFD/g, '');

                Object.entries(replacements).forEach(([bad, good]) => {
                    result = result.split(bad).join(good);
                });

                try {
                    const decoded = decodeURIComponent(escape(result));
                    if (decoded !== result && /[äöüÄÖÜßéèàáâãçñîïôùúû]/.test(decoded)) result = decoded;
                } catch(e) {}

                try {
                    if (/[\u00c0-\u00ff]/.test(result)) {
                        const bytes = new Uint8Array([...result].map(c => c.charCodeAt(0)));
                        const decoded2 = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
                        if (/[äöüÄÖÜß]/.test(decoded2)) result = decoded2;
                    }
                } catch(e) {}

                Object.entries(manualFixes).forEach(([wrong, correct]) => {
                    result = result.split(wrong).join(correct);
                });

                return result;
            }

            function fixObj(obj) {
                if (typeof obj === 'string') return fixStr(obj);
                if (Array.isArray(obj)) return obj.map(fixObj);
                if (obj && typeof obj === 'object') {
                    const fixed = {};
                    Object.entries(obj).forEach(([key, value]) => {
                        fixed[fixStr(key)] = fixObj(value);
                    });
                    return fixed;
                }
                return obj;
            }

            return fixObj(data);
        }

        function checkEncodingHealth(data) {
            const problems = [];
            const badPatterns = /[\uFFFD]|Ã¤|Ã¶|Ã¼|Ã„|Ã–|Ãœ|ÃŸ|â€|Ã©|Ã¨/;

            function scan(obj, path) {
                if (typeof obj === 'string') {
                    if (badPatterns.test(obj)) {
                        problems.push({ path, value: obj.substring(0, 80) });
                    }
                } else if (Array.isArray(obj)) {
                    obj.forEach((item, i) => scan(item, path + '[' + i + ']'));
                } else if (obj && typeof obj === 'object') {
                    Object.entries(obj).forEach(([k, v]) => {
                        if (badPatterns.test(k)) problems.push({ path: path + '.' + k + ' (KEY)', value: k });
                        scan(v, path + '.' + k);
                    });
                }
            }

            scan(data, 'data');

            if (problems.length > 0) {
                console.warn('[Encoding Check] ' + problems.length + ' Umlaut Probleme gefunden nach fixUmlauts():');
                problems.forEach(p => console.warn('  ' + p.path + ': "' + p.value + '"'));
            } else {
                console.log('[Encoding Check] Alle Texte sauber, keine Umlaut Probleme.');
            }
        }

        function init() {
            const params = new URLSearchParams(window.location.search);
            const apiParam = params.get('api');
            if (apiParam) API_URL = apiParam;

            loadLocalStorage();
            initTheme();
            initNavigation();
            loadData();
            setInterval(loadData, 5 * 60 * 1000);
        }

        function loadLocalStorage() {
            const statuses = localStorage.getItem('campaignStatuses');
            if (statuses) campaignStatuses = JSON.parse(statuses);

            const alerts = localStorage.getItem('dismissedAlerts');
            if (alerts) {
                const parsed = JSON.parse(alerts);
                if (Array.isArray(parsed)) {
                    dismissedAlerts = {};
                } else {
                    const today = new Date().toDateString();
                    dismissedAlerts = {};
                    Object.entries(parsed).forEach(([funnel, info]) => {
                        if (info.date === today) dismissedAlerts[funnel] = info;
                    });
                }
            }

            const costs = localStorage.getItem('costSettings');
            if (costs) costSettings = JSON.parse(costs);

            const profiles = localStorage.getItem('customerProfiles');
            if (profiles) customerProfiles = JSON.parse(profiles);

            const manual = localStorage.getItem('manualApplicants');
            if (manual) manualApplicants = JSON.parse(manual);
        }

        function saveLocalStorage() {
            localStorage.setItem('campaignStatuses', JSON.stringify(campaignStatuses));
            localStorage.setItem('dismissedAlerts', JSON.stringify(dismissedAlerts));
            localStorage.setItem('costSettings', JSON.stringify(costSettings));
            localStorage.setItem('customerProfiles', JSON.stringify(customerProfiles));
            localStorage.setItem('manualApplicants', JSON.stringify(manualApplicants));
        }

        function initTheme() {
            const theme = localStorage.getItem('dashboardTheme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').textContent = 'Tagesmodus';
            }

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const newTheme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
                localStorage.setItem('dashboardTheme', newTheme);
                document.getElementById('themeToggle').textContent = newTheme === 'light' ? 'Nachtmodus' : 'Tagesmodus';
            });
        }

        function initNavigation() {
            const tabBar = document.getElementById('tabBar');
            TABS.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab' + (tab.id === currentTab ? ' active' : '');
                tabEl.textContent = tab.label;
                tabEl.addEventListener('click', () => switchTab(tab.id));
                tabBar.appendChild(tabEl);
            });

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const tabId = item.dataset.tab;
                    switchTab(tabId);
                });
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));

            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((t, i) => {
                if (TABS[i].id === tabId) t.classList.add('active');
            });

            const activeNav = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (activeNav) activeNav.classList.add('active');

            const tabLabel = TABS.find(t => t.id === tabId)?.label || '';
            document.getElementById('pageTitle').textContent = tabLabel;

            renderTab(tabId);
        }

        function loadData() {
            const syncDot = document.getElementById('syncDot');
            syncDot.classList.add('syncing');

            fetch(`${API_URL}?action=dashboard`)
                .then(r => {
                    const ct = r.headers.get('content-type') || '';
                    if (ct.includes('charset') && !ct.includes('utf-8')) {
                        return r.arrayBuffer().then(buf => {
                            const decoded = new TextDecoder('utf-8').decode(buf);
                            return JSON.parse(decoded);
                        });
                    }
                    return r.text().then(txt => JSON.parse(txt));
                })
                .then(data => {
                    dashboardData = fixUmlauts(data);
                    checkEncodingHealth(dashboardData);
                    applyManualApplicants();
                    updateClientFilter();
                    const content = document.getElementById('contentArea');
                    const scrollPos = content ? content.scrollTop : 0;
                    renderTab(currentTab);
                    if (content) { content.scrollTop = scrollPos; requestAnimationFrame(() => { content.scrollTop = scrollPos; }); }
                    updateLastSync();
                    syncDot.classList.remove('syncing');
                })
                .catch(err => {
                    console.error('API Error:', err);
                    syncDot.style.background = '#ef4444';
                    document.getElementById('lastSync').textContent = 'Fehler beim Laden';
                });
        }

        function updateLastSync() {
            const now = new Date();
            const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastSync').textContent = `Aktualisiert: ${time}`;
        }

        function getAllCustomerNames() {
            const customerNames = new Set();
            (dashboardData.clients || []).forEach(funnel => {
                customerNames.add(dashboardData.customerMap[funnel] || funnel);
            });
            return Array.from(customerNames).sort();
        }

        function updateClientFilter() {
            const searchInput = document.getElementById('clientSearch');
            if (currentClient) {
                searchInput.value = currentClient;
            } else {
                searchInput.value = '';
                searchInput.placeholder = 'Kunde suchen...';
            }
        }

        function showClientDropdown() {
            filterClientDropdown(document.getElementById('clientSearch').value);
            document.getElementById('clientDropdown').style.display = 'block';
        }

        function filterClientDropdown(query) {
            const dropdown = document.getElementById('clientDropdown');
            const names = getAllCustomerNames();
            const q = query.toLowerCase();
            const filtered = q ? names.filter(n => n.toLowerCase().includes(q)) : names;

            let html = `<div onclick="selectClient('')" style="padding: 8px 14px; cursor: pointer; font-size: 13px; color: var(--color-primary-light); border-bottom: 1px solid var(--border-color);">Alle Kunden</div>`;
            filtered.forEach(name => {
                const isActive = name === currentClient;
                html += `<div onclick="selectClient('${name.replace(/'/g, "\\'")}')" style="padding: 8px 14px; cursor: pointer; font-size: 13px; ${isActive ? 'background: var(--bg-hover); font-weight: 600;' : ''}"
                    onmouseenter="this.style.background='var(--bg-hover)'" onmouseleave="this.style.background='${isActive ? 'var(--bg-hover)' : ''}'">
                    ${name}
                </div>`;
            });
            if (filtered.length === 0) {
                html += '<div style="padding: 8px 14px; font-size: 13px; color: var(--text-muted);">Kein Kunde gefunden</div>';
            }
            dropdown.innerHTML = html;
            dropdown.style.display = 'block';
        }

        function selectClient(name) {
            currentClient = name;
            document.getElementById('clientSearch').value = name;
            document.getElementById('clientDropdown').style.display = 'none';
            renderTab(currentTab);
        }

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('clientDropdown');
            const search = document.getElementById('clientSearch');
            if (dropdown && search && !dropdown.contains(e.target) && e.target !== search) {
                dropdown.style.display = 'none';
            }
        });

        function renderTab(tabId) {
            const content = document.getElementById('contentArea');

            if (tabId === 'overview') renderOverview(content);
            else if (tabId === 'today') renderDayTab(content, 'today');
            else if (tabId === 'yesterday') renderDayTab(content, 'yesterday');
            else if (tabId === 'week') renderPeriodTab(content, 'thisWeek', 'Woche');
            else if (tabId === 'month') renderMonthDetailTab(content);
            else if (tabId === 'monthly') renderMonthlyTab(content);
            else if (tabId === 'campaigns') renderCampaignsTab(content);
            else if (tabId === 'costs') renderCostsTab(content);
            else if (tabId === 'customerDetail') renderCustomerDetail(content);
            else if (tabId === 'instructions') renderInstructions(content);
        }

        function renderOverview(container) {
            const html = `
                <div class="kpi-grid" id="overviewKpis"></div>
                <div id="alertPanel"></div>
                <div class="section-title" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                    <span>Kampagnengesundheit</span>
                    <div id="healthFilterButtons" style="display: flex; gap: 6px;"></div>
                </div>
                <div class="table-container" id="healthTable"></div>
                <div class="section-title" style="display: flex; align-items: center; justify-content: space-between;">
                    <span>Aktuelle Bewerber</span>
                    <button onclick="showManualEntryDialog()" style="padding: 6px 14px; border-radius: 10px; border: 1px solid var(--color-primary); background: transparent; color: var(--color-primary-light); cursor: pointer; font-size: 12px; font-weight: 600;">+ Manuell nachtragen</button>
                </div>
                <div class="recent-applicants" id="recentApplicants"></div>
            `;
            container.innerHTML = html;

            renderOverviewKpis();
            renderAlertPanel();
            renderHealthTable(999);
            renderRecentApplicants(10);
        }

        function getMonthData() {
            const data = dashboardData.thisMonth || {};
            if (Object.keys(data).length === 0 && dashboardData.monthlyBreakdown && dashboardData.monthlyBreakdown.length > 0) {
                return dashboardData.monthlyBreakdown[dashboardData.monthlyBreakdown.length - 1].data || {};
            }
            return data;
        }

        function renderOverviewKpis() {
            const kpis = document.getElementById('overviewKpis');
            const data = dashboardData;
            const monthData = getMonthData();

            const todayTotal = currentClient ? getFilteredValue(data.today) : (getFilteredValue(data.today) || data.todayTotal || 0);
            const yesterdayTotal = currentClient ? getFilteredValue(data.yesterday) : (getFilteredValue(data.yesterday) || data.yesterdayTotal || 0);
            const weekTotal = currentClient ? getFilteredValue(data.thisWeek) : (getFilteredValue(data.thisWeek) || data.weekTotal || 0);
            const monthTotal = currentClient ? getFilteredValue(monthData) : (getFilteredValue(monthData) || data.monthTotal || 0);

            const dayOfMonth = new Date().getDate();
            const avgPerDay = monthTotal > 0 ? (monthTotal / dayOfMonth).toFixed(1) : (weekTotal > 0 ? (weekTotal / Math.min(dayOfMonth, 7)).toFixed(1) : 0);
            const activeCampaigns = data.clients.filter(c => !isInternalCampaign(c) && (!campaignStatuses[c] || campaignStatuses[c] === 'active')).length;
            const alertsCount = getAlertsCount();
            const bestCampaigns = getBestCampaigns(5);

            const change24h = yesterdayTotal > 0 ? (((todayTotal - yesterdayTotal) / yesterdayTotal) * 100).toFixed(0) : 0;
            const changeWeek = weekTotal > 0 ? (((todayTotal - (weekTotal / 7)) / (weekTotal / 7)) * 100).toFixed(0) : 0;

            const totalApplicants = getTotalApplicants();

            const kpiData = [
                { label: 'Bewerber insgesamt', value: totalApplicants, change: 0, changeType: '', highlight: true },
                { label: 'Heute', value: todayTotal, change: change24h, changeType: 'vs gestern' },
                { label: 'Gestern', value: yesterdayTotal, change: changeWeek, changeType: 'vs Durchschnitt' },
                { label: 'Woche', value: weekTotal, change: 0, changeType: '' },
                { label: 'Monat', value: monthTotal, change: 0, changeType: '' },
                { label: 'Durchschnitt pro Tag', value: avgPerDay, change: 0, changeType: '' },
                { label: 'Aktive Kampagnen', value: activeCampaigns, change: 0, changeType: '' },
                { label: 'Alarme', value: alertsCount, change: 0, changeType: '' }
            ];

            const monthNames = ['Januar', 'Februar', 'M\u00e4rz', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            const currentMonthName = monthNames[new Date().getMonth()];
            const prevMonthCampaigns = getBestCampaignsPrevMonth(5);
            const prevMonthName = monthNames[(new Date().getMonth() + 11) % 12];

            const renderRankingCard = (title, campaigns) => {
                if (campaigns.length === 0) return '';
                return '<div class="kpi-card">' +
                    `<div class="kpi-label">${title}</div>` +
                    '<div style="margin-top: 8px;">' +
                    campaigns.map(c =>
                        `<div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px;">` +
                        `<span style="color: var(--text-muted);">${c.rank}.</span> ` +
                        `<span style="flex: 1; margin-left: 6px; font-weight: ${c.rank <= 3 ? '600' : '400'};">${c.name}</span>` +
                        `<span style="background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 600;">${c.count}</span>` +
                        `</div>`
                    ).join('') +
                    '</div></div>';
            };

            let rankingHtml = renderRankingCard(`Beste Kampagnen (${currentMonthName})`, bestCampaigns)
                + renderRankingCard(`Beste Kampagnen (${prevMonthName})`, prevMonthCampaigns);

            kpis.innerHTML = kpiData.map(kpi => `
                <div class="kpi-card" ${kpi.highlight ? 'style="border: 1px solid var(--color-primary); background: linear-gradient(135deg, var(--bg-card), rgba(218, 33, 53, 0.08));"' : ''}>
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value" ${kpi.highlight ? 'style="color: var(--text-primary); font-size: 32px;"' : ''}>${kpi.value}</div>
                    ${kpi.change !== 0 ? `
                        <div class="kpi-change ${parseInt(kpi.change) >= 0 ? 'positive' : 'negative'}">
                            <span class="trend-arrow ${parseInt(kpi.change) > 0 ? 'up' : parseInt(kpi.change) < 0 ? 'down' : 'stable'}">
                                ${parseInt(kpi.change) > 0 ? '↑' : parseInt(kpi.change) < 0 ? '↓' : '→'}
                            </span>
                            ${Math.abs(kpi.change)}% ${kpi.changeType}
                        </div>
                    ` : ''}
                </div>
            `).join('') + rankingHtml;
        }

        function renderAlertPanel() {
            const panel = document.getElementById('alertPanel');
            const alerts = calculateAlerts();

            if (alerts.length === 0) {
                panel.innerHTML = `
                    <div class="alert-panel">
                        <div class="alert-title">
                            ✓ Kampagnen Alarm
                        </div>
                        <div style="padding: 20px; text-align: center; color: var(--color-success);">
                            Alle Kampagnen sind in guter Verfassung!
                        </div>
                    </div>
                `;
                return;
            }

            panel.innerHTML = `
                <div class="alert-panel">
                    <div class="alert-title">
                        ⚠ Kampagnen Alarm (${alerts.length})
                    </div>
                    <div class="alert-grid">
                        ${alerts.map((alert, idx) => `
                            <div class="alert-item ${alert.severity === 'critical' ? 'critical' : alert.severity === 'warning' ? '' : 'good'}">
                                <div class="alert-dot ${alert.severity === 'critical' ? 'critical' : alert.severity === 'warning' ? 'warning' : 'good'}"></div>
                                <div class="alert-content">
                                    <div class="alert-customer">${alert.customer}</div>
                                    <div class="alert-funnel">${alert.funnel}</div>
                                    <div class="alert-date">Letzte: ${alert.lastDate}</div>
                                    ${alert.hint ? `<div style="font-size: 10px; color: var(--color-warning); font-weight: 600; margin-top: 2px;">&#9888; ${alert.hint}</div>` : ''}
                                </div>
                                <div class="alert-days">${alert.daysSince} Tage</div>
                                <button class="alert-dismiss" onclick="dismissAlert('${alert.funnel}', '${alert.severity}')">X</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function getManualLastDate(funnel) {
            let latestDate = null;
            Object.entries(manualApplicants).forEach(([key, val]) => {
                const [f] = key.split('|||');
                if (f !== funnel) return;
                const entry = typeof val === 'object' ? val : {};
                if (entry.date) {
                    const d = new Date(entry.date);
                    if (!isNaN(d.getTime()) && (!latestDate || d > latestDate)) latestDate = d;
                }
            });
            return latestDate;
        }

        function isManualOnlyCampaign(funnel) {
            return Object.keys(manualApplicants).some(key => key.split('|||')[0] === funnel);
        }

        function calculateAlerts() {
            const alerts = [];
            const customers = {};

            dashboardData.recentApplicants.forEach(app => {
                if (!customers[app.client]) {
                    customers[app.client] = app;
                }
            });

            dashboardData.clients.forEach(funnel => {
                if (campaignStatuses[funnel] !== 'active' && campaignStatuses[funnel]) return;

                const lastApp = dashboardData.recentApplicants.find(a => a.client === funnel)
                    || (dashboardData.lastApplicantByClient && dashboardData.lastApplicantByClient[funnel]);

                let daysSince;
                let lastDate;
                let isManual = false;

                if (lastApp) {
                    daysSince = calculateDaysSince(lastApp.date);
                    lastDate = lastApp.date;
                } else {
                    // Manuelle Eintraege pruefen
                    const manualDate = getManualLastDate(funnel);
                    if (manualDate) {
                        isManual = true;
                        const now = new Date();
                        daysSince = Math.floor((now - manualDate) / (1000 * 60 * 60 * 24));
                        lastDate = manualDate.toLocaleDateString('de-DE');
                    } else {
                        daysSince = 999;
                        lastDate = 'Keine';
                    }
                }

                // Manuelle Kampagnen: Erinnerung alle 7 Tage (Webhook pruefen)
                if (isManual && !lastApp) {
                    if (daysSince >= 7) {
                        const dismissed = dismissedAlerts[funnel];
                        // Dismiss gilt nur 7 Tage bei manuellen Kampagnen
                        if (dismissed) {
                            const dismissDate = new Date(dismissed.date);
                            const daysSinceDismiss = Math.floor((new Date() - dismissDate) / (1000 * 60 * 60 * 24));
                            if (daysSinceDismiss < 7) return;
                        }
                        alerts.push({
                            funnel,
                            customer: dashboardData.customerMap[funnel] || funnel,
                            lastDate: lastDate + ' (manuell)',
                            daysSince,
                            severity: 'warning',
                            hint: 'Webhook eingerichtet?'
                        });
                    }
                    return;
                }

                let severity = 'good';
                if (daysSince > 10) severity = 'critical';
                else if (daysSince >= 5) severity = 'warning';

                if (severity !== 'good') {
                    const dismissed = dismissedAlerts[funnel];
                    if (dismissed && dismissed.severity === severity) return;
                    alerts.push({
                        funnel,
                        customer: dashboardData.customerMap[funnel] || funnel,
                        lastDate,
                        daysSince,
                        severity
                    });
                }
            });

            return alerts.sort((a, b) => {
                const severityOrder = { critical: 0, warning: 1, good: 2 };
                return severityOrder[a.severity] - severityOrder[b.severity];
            });
        }

        function dismissAlert(funnel, severity) {
            dismissedAlerts[funnel] = { severity: severity, date: new Date().toDateString() };

        function calculateDaysSince(dateStr) {
            try {
                const [datePart, timePart] = dateStr.split(' ');
                const [day, month, year] = datePart.split('.');
                const date = new Date(year, month - 1, day);
                const now = new Date();
                const diff = now - date;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            } catch (e) {
                return 999;
            }
        }

        function filterCampaigns(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`button[onclick="filterCampaigns('${filter}')"]`).classList.add('active');

            const body = document.getElementById('campaignsBody');
            const sortedClients = [...dashboardData.clients].sort((a, b) => {
                const custA = (dashboardData.customerMap[a] || a).toLowerCase();
                const custB = (dashboardData.customerMap[b] || b).toLowerCase();
                if (custA < custB) return -1;
                if (custA > custB) return 1;
                return a.localeCompare(b);
            });
            let lastCustomer = '';
            const rows = sortedClients.map(funnel => {
                const customer = dashboardData.customerMap[funnel] || funnel;
                const status = campaignStatuses[funnel] || 'active';
                const mData = getMonthData();
                const monthData = mData[funnel] || 0;
                const weekData = getFilteredValue(dashboardData.thisWeek, funnel);
                let totalAll = 0;
                (dashboardData.monthlyBreakdown || []).forEach(m => { totalAll += (m.data || {})[funnel] || 0; });

                if (filter !== 'all' && status !== filter) return null;

                const history = (costSettings.statusHistory || {})[funnel] || [];
                const escapedFunnel = funnel.replace(/'/g, "\\'");
                const separator = lastCustomer && lastCustomer !== customer ? '<tr style="height: 12px; border: none;"><td colspan="8" style="border: none; padding: 0; background: transparent;"></td></tr>' : '';
                lastCustomer = customer;
                return separator + `
                    <tr class="${status === 'paused' ? 'paused' : status === 'filled' ? 'filled' : status === 'stopped' ? 'filled' : ''}">
                        <td><a href="#" onclick="event.preventDefault(); navigateToCustomer('${customer.replace(/'/g, "\\'")}')" style="color: var(--text-primary); text-decoration: none; font-weight: 600;">${customer}</a></td>
                        <td style="font-size: 12px; color: var(--text-muted);">${funnel}</td>
                        <td>
                            <span class="status-badge status-${status}">
                                ${status === 'active' ? 'Aktiv' : status === 'paused' ? 'Pausiert' : status === 'filled' ? 'Stelle besetzt' : status === 'stopped' ? 'Deaktiviert' : 'Aktiv'}
                            </span>
                        </td>
                        <td>${weekData}</td>
                        <td>${monthData}</td>
                        <td><strong>${totalAll}</strong></td>
                        <td>
                            <div class="btn-group">
                                ${status !== 'active' ? `<button class="btn btn-small btn-success" onclick="setCampaignStatus('${escapedFunnel}', 'active')">Aktivieren</button>` : ''}
                                ${status !== 'paused' ? `<button class="btn btn-small" style="background: var(--color-warning); color: #fff;" onclick="setCampaignStatus('${escapedFunnel}', 'paused')">Pausieren</button>` : ''}
                                ${status !== 'filled' ? `<button class="btn btn-small" style="background: var(--color-info); color: #fff;" onclick="setCampaignStatus('${escapedFunnel}', 'filled')">Stelle besetzt</button>` : ''}
                                ${status !== 'stopped' ? `<button class="btn btn-small" style="background: var(--color-danger); color: #fff;" onclick="setCampaignStatus('${escapedFunnel}', 'stopped')">Deaktiviert</button>` : ''}
                            </div>
                        </td>
                        <td style="font-size: 11px; color: var(--text-muted); max-width: 180px;">
                            ${history.length > 0 ? history.slice(-3).map(h => `<div>${h.date} ${h.time}: ${h.to}</div>`).join('') : ''}
                        </td>
                    </tr>
                `;
            }).filter(r => r).join('');

            body.innerHTML = rows || '<tr><td colspan="8" style="text-align: center; color: var(--text-muted);">Keine Kampagnen gefunden</td></tr>';
        }

        function setCampaignStatus(funnel, status) {
            const oldStatus = campaignStatuses[funnel] || 'active';
            campaignStatuses[funnel] = status;
            const statusLabelsMap = { active: 'Aktiv', paused: 'Pausiert', filled: 'Stelle besetzt', stopped: 'Deaktiviert' };
            if (!costSettings.statusHistory) costSettings.statusHistory = {};
            if (!costSettings.statusHistory[funnel]) costSettings.statusHistory[funnel] = [];
            const now = new Date();
            const dateStr = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            costSettings.statusHistory[funnel].push({
                from: statusLabelsMap[oldStatus] || oldStatus,
                to: statusLabelsMap[status] || status,
                date: dateStr,
                time: timeStr
            });
            saveLocalStorage();
            try {
                filterCampaigns(document.querySelector('.filter-btn.active').onclick.toString().match(/'(\w+)'/)[1]);
            } catch(e) { filterCampaigns('all'); }
            renderAlertPanel();
        }

        function renderCostsTab(container) {
            const defaultBudgetPerDay = costSettings.budgetPerDay || 20;

            let html = `
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Tagesbudget pro Kampagne</label>
                        <div class="setting-description">Standard: 20 Euro pro Tag und Kampagne</div>
                        <div class="input-group">
                            <input type="number" class="input" id="budgetInput" value="${defaultBudgetPerDay}" min="1" step="1">
                            <span>Euro</span>
                            <button class="btn btn-primary btn-small" onclick="saveBudgetSetting()">Speichern</button>
                        </div>
                    </div>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card" style="border: 1px solid var(--color-primary); background: linear-gradient(135deg, var(--bg-card), rgba(218, 33, 53, 0.08));">
                        <div class="kpi-label">Bewerber insgesamt</div>
                        <div class="kpi-value" style="color: var(--text-primary); font-size: 32px;">${getTotalApplicants()}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Gesamtbudget (30 Tage)</div>
                        <div class="kpi-value">${(defaultBudgetPerDay * 30 * dashboardData.clients.length).toLocaleString('de-DE')} Euro</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Durchschnittliche Kosten pro Bewerbung</div>
                        <div class="kpi-value">${calculateAvgCostPerApplicant().toFixed(2)} Euro</div>
                    </div>
                </div>

                <div class="section-title">Kosten pro Kampagne</div>
                <div class="cost-grid" id="costGrid"></div>
            `;

            container.innerHTML = html;
            renderCostGrid(defaultBudgetPerDay);
        }

        function saveBudgetSetting() {
            const budget = parseFloat(document.getElementById('budgetInput').value) || 20;
            costSettings.budgetPerDay = budget;
            saveLocalStorage();
            renderCostsTab(document.getElementById('contentArea'));
        }

        function renderCostGrid(defaultBudget) {
            const costGrid = document.getElementById('costGrid');
            const monthlyData = dashboardData.monthlyBreakdown?.[dashboardData.monthlyBreakdown.length - 1]?.data || {};

            const sortedClients = [...dashboardData.clients].sort((a, b) => {
                const custA = (dashboardData.customerMap[a] || a).toLowerCase();
                const custB = (dashboardData.customerMap[b] || b).toLowerCase();
                if (custA < custB) return -1;
                if (custA > custB) return 1;
                return a.localeCompare(b);
            });

            const costs = sortedClients.map(funnel => {
                const individualBudget = costSettings.individualBudgets?.[funnel];
                const budgetPerDay = individualBudget || defaultBudget;
                const monthlyApplicants = monthlyData[funnel] || getFilteredValue(dashboardData.thisMonth, funnel) || getFilteredValue(dashboardData.thisWeek, funnel);
                const estimatedSpend = budgetPerDay * 30;
                const costPerApplicant = monthlyApplicants > 0 ? (estimatedSpend / monthlyApplicants) : null;
                const feedback = costSettings.feedback?.[funnel] || '';

                let rating = 'good';
                if (costPerApplicant !== null) {
                    if (costPerApplicant > 40) rating = 'bad';
                    else if (costPerApplicant > 25) rating = 'medium';
                }

                return { funnel, customer: dashboardData.customerMap[funnel] || funnel, budgetPerDay, estimatedSpend, costPerApplicant, monthlyApplicants, rating, feedback, isCustomBudget: !!individualBudget };
            }).sort((a, b) => (a.costPerApplicant || 999) - (b.costPerApplicant || 999));

            costGrid.innerHTML = costs.map(cost => `
                <div class="cost-card">
                    <div class="cost-header">
                        <div>
                            <div class="cost-campaign">${cost.customer}</div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${cost.funnel}</div>
                        </div>
                        <div class="cost-rating cost-${cost.rating}">
                            ${cost.rating === 'good' ? 'Gut' : cost.rating === 'medium' ? 'Mittel' : 'Schlecht'}
                        </div>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Bewerber (Monat)</span>
                        <span class="cost-value">${cost.monthlyApplicants}</span>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Tagesbudget</span>
                        <span class="cost-value">
                            <input type="number" class="input" style="width: 70px; padding: 3px 6px; font-size: 12px; display: inline-block;" value="${cost.budgetPerDay}" min="1" step="1" onchange="saveIndividualBudget('${cost.funnel}', this.value)">
                            Euro ${cost.isCustomBudget ? '<span style="color: var(--color-primary); font-size: 10px;">(individuell)</span>' : ''}
                        </span>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Geschätztes Budget (30 Tage)</span>
                        <span class="cost-value">${cost.estimatedSpend.toLocaleString('de-DE')} Euro</span>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Kosten pro Bewerbung</span>
                        <span class="cost-value">${cost.costPerApplicant !== null ? cost.costPerApplicant.toFixed(2) + ' Euro' : 'N/A'}</span>
                    </div>
                    <div class="cost-row" style="flex-direction: column; align-items: flex-start; gap: 6px; margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                        <span class="cost-label">Feedback / Notizen</span>
                        <textarea class="input" style="width: 100%; min-height: 50px; padding: 6px 8px; font-size: 12px; resize: vertical;" placeholder="z.B. Kunde zufrieden, Qualität der Bewerber gut..." onchange="saveFeedback('${cost.funnel}', this.value)">${cost.feedback}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function saveIndividualBudget(funnel, value) {
            if (!costSettings.individualBudgets) costSettings.individualBudgets = {};
            const budget = parseFloat(value);
            if (budget && budget > 0) {
                costSettings.individualBudgets[funnel] = budget;
            } else {
                delete costSettings.individualBudgets[funnel];
            }
            saveLocalStorage();
        }

        function saveFeedback(funnel, text) {
            if (!costSettings.feedback) costSettings.feedback = {};
            if (text.trim()) {
                costSettings.feedback[funnel] = text.trim();
            } else {
                delete costSettings.feedback[funnel];
            }
            saveLocalStorage();
        }

        function calculateAvgCostPerApplicant() {
            const totalMonthlyApplicants = dashboardData.monthlyBreakdown[dashboardData.monthlyBreakdown.length - 1]?.total || dashboardData.monthTotal || 1;
            const budgetPerDay = costSettings.budgetPerDay || 20;
            const totalBudget = budgetPerDay * 30 * dashboardData.clients.length;
            return totalBudget / totalMonthlyApplicants;
        }

        function navigateToCustomer(customerName) {
            selectedDetailCustomer = customerName;
            currentTab = 'customerDetail';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(n => { if (n.textContent.trim() === 'Kundendetail') n.classList.add('active'); });
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            renderTab('customerDetail');
        }

        function getCustomerFunnels(customerName) {
            const customerMap = dashboardData.customerMap || {};
            return (dashboardData.clients || []).filter(funnel => {
                return (customerMap[funnel] || funnel) === customerName;
            });
        }

        function getCustomerProfile(customerName) {
            if (!customerProfiles[customerName]) {
                customerProfiles[customerName] = {
                    ansprechpartner: '',
                    telefon: '',
                    email: '',
                    vertragsbeginn: '',
                    notizen: '',
                    campaigns: {}
                };
            }
            return customerProfiles[customerName];
        }

        function saveCampaignTimeline(customerName, index, field, value) {
            const profile = getCustomerProfile(customerName);
            if (!profile.kampagnen) profile.kampagnen = [];
            while (profile.kampagnen.length <= index) profile.kampagnen.push({});
            profile.kampagnen[index][field] = value;
            customerProfiles[customerName] = profile;
            saveLocalStorage();
        }

        function saveCustomerProfile(customerName, field, value) {
            const profile = getCustomerProfile(customerName);
            profile[field] = value;
            customerProfiles[customerName] = profile;
            saveLocalStorage();
        }

        function saveCampaignDetail(customerName, funnel, field, value) {
            const profile = getCustomerProfile(customerName);
            if (!profile.campaigns[funnel]) profile.campaigns[funnel] = {};
            profile.campaigns[funnel][field] = value;
            customerProfiles[customerName] = profile;
            saveLocalStorage();
        }

        function renderCustomerDetail(container) {
            const customerMap = dashboardData.customerMap || {};
            const customerNames = new Set();
            (dashboardData.clients || []).forEach(funnel => {
                customerNames.add(customerMap[funnel] || funnel);
            });
            const sortedCustomers = Array.from(customerNames).sort();

            if (!selectedDetailCustomer && sortedCustomers.length > 0) {
                selectedDetailCustomer = sortedCustomers[0];
            }

            const customer = selectedDetailCustomer;
            const allFunnels = getCustomerFunnels(customer);
            const funnels = selectedDetailFunnel ? allFunnels.filter(f => f === selectedDetailFunnel) : allFunnels;
            const profile = getCustomerProfile(customer);
            const monthData = getMonthData();
            const weekData = dashboardData.thisWeek || {};
            const todayData = dashboardData.today || {};
            const yesterdayData = dashboardData.yesterday || {};
            const breakdown = dashboardData.monthlyBreakdown || [];

            // Zeitraum Filter anwenden
            const fromIdx = customerDetailMonthFrom >= 0 ? customerDetailMonthFrom : 0;
            const toIdx = customerDetailMonthTo >= 0 ? customerDetailMonthTo : breakdown.length - 1;
            const filteredBreakdown = breakdown.slice(fromIdx, toIdx + 1);

            let totalMonth = 0, totalWeek = 0, totalToday = 0, totalYesterday = 0, totalAllTime = 0, totalFiltered = 0;
            funnels.forEach(f => {
                totalMonth += monthData[f] || 0;
                totalWeek += weekData[f] || 0;
                totalToday += todayData[f] || 0;
                totalYesterday += yesterdayData[f] || 0;
                breakdown.forEach(m => { totalAllTime += (m.data || {})[f] || 0; });
                filteredBreakdown.forEach(m => { totalFiltered += (m.data || {})[f] || 0; });
            });

            const activeCampaigns = funnels.filter(f => !campaignStatuses[f] || campaignStatuses[f] === 'active').length;
            const pausedCampaigns = funnels.filter(f => campaignStatuses[f] === 'paused').length;
            const filledCampaigns = funnels.filter(f => campaignStatuses[f] === 'filled').length;
            const stoppedCampaigns = funnels.filter(f => campaignStatuses[f] === 'stopped').length;

            const applicants = (dashboardData.recentApplicants || []).filter(app => {
                const matchCustomer = (customerMap[app.client] || app.client) === customer;
                if (selectedDetailFunnel) return matchCustomer && app.client === selectedDetailFunnel;
                return matchCustomer;
            });

            // Chart Daten: gestapelt pro Kampagne
            const monthlyChartData = [];
            filteredBreakdown.forEach(month => {
                let total = 0;
                funnels.forEach(f => { total += (month.data || {})[f] || 0; });
                monthlyChartData.push({ label: formatMonthLabel(month.label), total });
            });

            // Pro Kampagne monatliche Daten fuer Stacked Chart
            const chartColors = ['#DA2135','#10b981','#f59e0b','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#e879f9'];
            const stackedDatasets = funnels.map((f, i) => ({
                label: f.length > 30 ? f.substring(0, 28) + '...' : f,
                data: filteredBreakdown.map(m => (m.data || {})[f] || 0),
                backgroundColor: chartColors[i % chartColors.length] + 'B3',
                borderColor: chartColors[i % chartColors.length],
                borderWidth: 1,
                borderRadius: 4
            }));

            // Statistiken
            const avgPerMonth = filteredBreakdown.length > 0 ? (totalFiltered / filteredBreakdown.length).toFixed(1) : '0';
            let bestFunnel = '', bestFunnelCount = 0;
            funnels.forEach(f => {
                let count = 0;
                filteredBreakdown.forEach(m => { count += (m.data || {})[f] || 0; });
                if (count > bestFunnelCount) { bestFunnelCount = count; bestFunnel = f; }
            });

            // Wachstum berechnen (letzte 2 Monate im Filter)
            let growthPct = 0;
            if (filteredBreakdown.length >= 2) {
                const lastMonth = filteredBreakdown[filteredBreakdown.length - 1];
                const prevMonth = filteredBreakdown[filteredBreakdown.length - 2];
                let lastTotal = 0, prevTotal = 0;
                funnels.forEach(f => { lastTotal += (lastMonth.data || {})[f] || 0; prevTotal += (prevMonth.data || {})[f] || 0; });
                growthPct = prevTotal > 0 ? ((lastTotal - prevTotal) / prevTotal * 100).toFixed(0) : 0;
            }

            // Zeitraum Optionen
            const monthOptions = breakdown.map((m, i) => `<option value="${i}" ${i === fromIdx ? 'selected' : ''}>${formatMonthLabel(m.label)}</option>`).join('');
            const monthOptionsTo = breakdown.map((m, i) => `<option value="${i}" ${i === toIdx ? 'selected' : ''}>${formatMonthLabel(m.label)}</option>`).join('');

            // Funnel Filter Optionen
            const funnelOptions = `<option value="">Alle Kampagnen (${allFunnels.length})</option>` +
                allFunnels.map(f => `<option value="${f}" ${f === selectedDetailFunnel ? 'selected' : ''}>${f}</option>`).join('');

            let html = `
                <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: end; margin-bottom: 20px;">
