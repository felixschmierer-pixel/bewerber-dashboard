                            ${sortedCustomers.map(c => `<option value="${c}" ${c === customer ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px;">Kampagne</label>
                        <select id="customerFunnelSelect" style="padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 14px; min-width: 240px; cursor: pointer;">
                            ${funnelOptions}
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px;">Von</label>
                        <select id="customerMonthFrom" style="padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 14px; cursor: pointer;">
                            ${monthOptions}
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px;">Bis</label>
                        <select id="customerMonthTo" style="padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 14px; cursor: pointer;">
                            ${monthOptionsTo}
                        </select>
                    </div>
                    <button onclick="customerDetailMonthFrom=-1;customerDetailMonthTo=-1;selectedDetailFunnel='';renderTab('customerDetail')"
                        style="padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-hover); color: var(--text-primary); cursor: pointer; font-size: 13px;">Filter Reset</button>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card" style="border: 1px solid var(--color-primary); background: linear-gradient(135deg, var(--bg-card), rgba(218, 33, 53, 0.08));">
                        <div class="kpi-label">Bewerber insgesamt</div>
                        <div class="kpi-value" style="color: var(--text-primary); font-size: 32px;">${totalAllTime}</div>
                    </div>
                    <div class="kpi-card" style="border: 1px solid var(--color-info);">
                        <div class="kpi-label">Im Zeitraum</div>
                        <div class="kpi-value" style="color: var(--color-info);">${totalFiltered}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Heute</div>
                        <div class="kpi-value">${totalToday}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Gestern</div>
                        <div class="kpi-value">${totalYesterday}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Woche</div>
                        <div class="kpi-value">${totalWeek}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Monat</div>
                        <div class="kpi-value">${totalMonth}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">&#216; pro Monat</div>
                        <div class="kpi-value">${avgPerMonth}</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Wachstum</div>
                        <div class="kpi-value" style="color: ${Number(growthPct) >= 0 ? 'var(--color-success)' : 'var(--color-danger)'};">${Number(growthPct) >= 0 ? '+' : ''}${growthPct}%</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Aktiv / Gesamt</div>
                        <div class="kpi-value">${activeCampaigns} / ${funnels.length}</div>
                    </div>
                </div>

                ${bestFunnel ? `<div style="background: var(--bg-card); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--border-color); margin-top: 16px; display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 20px;">&#127942;</span>
                    <div><span style="color: var(--text-muted); font-size: 13px;">Beste Kampagne im Zeitraum:</span>
                    <strong style="color: var(--text-primary); margin-left: 6px;">${bestFunnel}</strong>
                    <span style="color: var(--text-secondary); margin-left: 6px;">(${bestFunnelCount} Bewerber)</span></div>
                </div>` : ''}

                <div style="display: grid; grid-template-columns: ${funnels.length > 1 ? '1fr 1fr' : '1fr'}; gap: 20px; margin-top: 20px;">
                    <div>
                        <div class="section-title">${funnels.length > 1 ? 'Kampagnen Vergleich (gestapelt)' : 'Monatsverlauf'}</div>
                        <div style="background: var(--bg-card); border-radius: 10px; padding: 16px; border: 1px solid var(--border-color); height: 280px;">
                            <canvas id="customerStackedChart"></canvas>
                        </div>
                    </div>
                    ${funnels.length > 1 ? `<div>
                        <div class="section-title">Gesamt Verlauf</div>
                        <div style="background: var(--bg-card); border-radius: 10px; padding: 16px; border: 1px solid var(--border-color); height: 280px;">
                            <canvas id="customerTotalLineChart"></canvas>
                        </div>
                    </div>` : ''}
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <div class="section-title">Kontaktdaten</div>
                        <div style="background: var(--bg-card); border-radius: 10px; padding: 16px; border: 1px solid var(--border-color);">
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                                <div>
                                    <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px;">Ansprechpartner</label>
                                    <input type="text" value="${profile.ansprechpartner || ''}" onchange="saveCustomerProfile('${customer}', 'ansprechpartner', this.value)"
                                        style="width: 100%; padding: 6px 10px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px;">

            if (!data) return 0;

            if (!currentClient) return Object.values(data).reduce((a, b) => a + b, 0);
            let total = 0;
            const customerMap = dashboardData.customerMap || {};
            Object.entries(data).forEach(([key, count]) => {
                const customer = customerMap[key] || key;
                if (customer === currentClient || key === currentClient) total += count;
            });
            return total;
        }

        function getTotalApplicants() {
            const breakdown = dashboardData.monthlyBreakdown || [];
            if (breakdown.length === 0) return 0;
            if (!currentClient) {
                return breakdown.reduce((sum, m) => sum + (m.total || 0), 0);
            }
            const customerMap = dashboardData.customerMap || {};
            let total = 0;
            breakdown.forEach(m => {
                const data = m.data || {};
                Object.entries(data).forEach(([funnel, count]) => {
                    const customer = customerMap[funnel] || funnel;
                    if (customer === currentClient || funnel === currentClient) total += count;
                });
            });
            return total;
        }

        function formatMonthLabel(label) {
            if (!label) return '';
            const monthNamesDE = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            // Falls bereits formatiert (z.B. "März 2026" oder "Mär 26")
            if (monthNamesDE.some(m => label.startsWith(m))) return label;
            // Rohe Date Strings parsen (z.B. "Sun Mar 01 2026 00:00:00 GMT+0100...")
            const d = new Date(label);
            if (!isNaN(d.getTime())) {
                return monthNamesDE[d.getMonth()] + ' ' + d.getFullYear();
            }
            // Kurzformat wie "2026-03" oder "Mar 2026"
            const shortMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            for (let i = 0; i < shortMonths.length; i++) {
                if (label.includes(shortMonths[i])) {
                    const yearMatch = label.match(/\d{4}/);
                    return monthNamesDE[i] + (yearMatch ? ' ' + yearMatch[0] : '');
                }
            }
            return label;
        }

        function isInternalCampaign(funnel) {
            const lower = funnel.toLowerCase();
            return lower.startsWith('redline');
        }

        function getBestCampaigns(limit) {
            limit = limit || 5;
            const monthData = getMonthData();
            const weekData = dashboardData.thisWeek || {};
            const checkData = Object.keys(monthData).length > 0 ? monthData : weekData;
            const customerMap = dashboardData.customerMap || {};

            return Object.entries(checkData)
                .filter(([funnel, count]) => {
                    if (isInternalCampaign(funnel)) return false;
                    if (!currentClient) return true;
                    const customer = customerMap[funnel] || funnel;
                    return customer === currentClient || funnel === currentClient;
                })
                .sort((a, b) => b[1] - a[1])
                .slice(0, limit)
                .map(([funnel, count], i) => ({ rank: i + 1, name: funnel, count }));
        }

        function getBestCampaignsPrevMonth(limit) {
            limit = limit || 5;
            const breakdown = dashboardData.monthlyBreakdown || [];
            if (breakdown.length < 2) return [];
            const prevMonthData = breakdown[breakdown.length - 2].data || {};
            const customerMap = dashboardData.customerMap || {};

            return Object.entries(prevMonthData)
                .filter(([funnel, count]) => {
                    if (isInternalCampaign(funnel)) return false;
                    if (!currentClient) return true;
                    const customer = customerMap[funnel] || funnel;
                    return customer === currentClient || funnel === currentClient;
                })
                .sort((a, b) => b[1] - a[1])
                .slice(0, limit)
                .map(([funnel, count], i) => ({ rank: i + 1, name: funnel, count }));
        }

                            <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 3px;">Kunde</label>
                            <div style="display: flex; gap: 8px;">
                                <select id="manualCustomerSelect" style="flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px;">
                                    <option value="">Oder rechts eintippen</option>
                                    ${customerOptions}
                                </select>
                                <input type="text" id="manualCustomerNew" placeholder="Neuer Kunde" style="flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px;">
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;">
                        <div>
                            <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 3px;">Anzahl Bewerber</label>
                            <input type="number" id="manualCount" value="1" min="1" style="width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px;">
                        </div>
                        <div>
                            <label style="font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 3px;">Datum</label>
                            <input type="date" id="manualDate" value="${today}" style="width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 8px; justify-content: flex-end;">
                        <button onclick="closeManualEntry()" style="padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); cursor: pointer;">Abbrechen</button>
                        <button onclick="saveManualEntry()" style="padding: 8px 16px; border-radius: 10px; border: none; background: var(--color-primary); color: #fff; cursor: pointer; font-weight: 600;">Speichern</button>
                    </div>

                    <div style="margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 12px;">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">Manuell eingetragen:</div>
                        <div id="manualEntryList" style="font-size: 12px; max-height: 200px; overflow-y: auto;"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeManualEntry(); });

            // Toggle: wenn bestehende Kampagne gewählt, neue Sektion ausgrauen
            document.getElementById('manualFunnel').addEventListener('change', function() {
                const newSection = document.getElementById('manualNewSection');
                newSection.style.opacity = this.value ? '0.4' : '1';
                newSection.style.pointerEvents = this.value ? 'none' : 'auto';
            });

            renderManualEntryList();
        }

        function closeManualEntry() {
            const overlay = document.getElementById('manualEntryOverlay');
            if (overlay) overlay.remove();
        }

        function renderManualEntryList() {
            const list = document.getElementById('manualEntryList');
            if (!list) return;
            const entries = Object.entries(manualApplicants);
            if (entries.length === 0) {
                list.innerHTML = '<div style="color: var(--text-muted);">Noch keine manuellen Eintr\u00e4ge</div>';
                return;
            }

            // Funnel Optionen fuer Zuordnung
            const clients = dashboardData.clients || [];
            const customerMap = dashboardData.customerMap || {};

            list.innerHTML = entries.map(([key, val]) => {
                const entry = typeof val === 'object' ? val : { count: val, customer: '', date: '', linkedTo: '' };
                const [funnel, monthIdx] = key.split('|||');
                const monthLabel = formatMonthLabel((dashboardData.monthlyBreakdown || [])[parseInt(monthIdx)]?.label || monthIdx);
                const isLinked = entry.linkedTo ? true : false;
                const displayName = isLinked ? `<span style="text-decoration: line-through; opacity: 0.5;">${funnel}</span> &#10132; <strong>${entry.linkedTo}</strong>` : funnel;
                const customerDisplay = entry.customer ? ` <span style="color: var(--color-primary-light);">[${entry.customer}]</span>` : '';
                const dateDisplay = entry.date ? ` <span style="color: var(--text-muted);">${entry.date}</span>` : '';
                const count = entry.count || val;

                // Zuordnen Button: nur wenn nicht bereits zugeordnet und es echte Funnels gibt
                const linkBtn = !isLinked && clients.length > 0
                    ? `<button onclick="showLinkDialog('${key.replace(/'/g, "\\'")}')" style="background: var(--color-info); color: #fff; border: none; border-radius: 10px; padding: 1px 6px; cursor: pointer; font-size: 10px;" title="Einem echten Webhook Funnel zuordnen">&#128279;</button>`
                    : '';

                return `<div style="padding: 5px 0; border-bottom: 1px solid var(--border-color);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>${displayName}${customerDisplay}</span>
                        <span style="display: flex; align-items: center; gap: 4px;">
                            <strong>+${count}</strong>${dateDisplay}
                            ${linkBtn}
                            <button onclick="removeManualEntry('${key.replace(/'/g, "\\'")}')" style="background: var(--color-danger); color: #fff; border: none; border-radius: 10px; padding: 1px 6px; cursor: pointer; font-size: 10px;">X</button>
                        </span>
                    </div>
                    <div style="font-size: 10px; color: var(--text-muted);">${monthLabel}</div>
                </div>`;
            }).join('');
        }

        function showLinkDialog(entryKey) {
            const clients = dashboardData.clients || [];
            const customerMap = dashboardData.customerMap || {};
            const opts = clients.map(f => `<option value="${f}">${f} (${customerMap[f] || f})</option>`).join('');

            const [funnel] = entryKey.split('|||');
            const dialog = document.createElement('div');
            dialog.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-card); border-radius: 10px; padding: 20px; z-index: 10001; border: 2px solid var(--color-info); width: 400px; max-width: 90vw;';
            dialog.innerHTML = `
                <h4 style="margin-bottom: 8px; font-size: 14px;">"${funnel}" zuordnen</h4>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Die manuellen Bewerber werden dem echten Webhook Funnel zugerechnet. So entsteht keine Dopplung.</p>
                <select id="linkTarget" style="width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-darker); color: var(--text-primary); font-size: 13px; margin-bottom: 12px;">
                    ${opts}
                </select>
                <div style="display: flex; gap: 8px; justify-content: flex-end;">
                    <button onclick="this.parentElement.parentElement.remove()" style="padding: 6px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px;">Abbrechen</button>
                    <button onclick="linkManualEntry('${entryKey.replace(/'/g, "\\'")}', document.getElementById('linkTarget').value); this.parentElement.parentElement.remove();"
                        style="padding: 6px 14px; border-radius: 10px; border: none; background: var(--color-info); color: #fff; cursor: pointer; font-weight: 600; font-size: 12px;">Zuordnen</button>
                </div>
            `;
            document.body.appendChild(dialog);
        }

        function linkManualEntry(oldKey, targetFunnel) {
            if (!targetFunnel || !manualApplicants[oldKey]) return;
            const oldEntry = manualApplicants[oldKey];
            const entry = typeof oldEntry === 'object' ? oldEntry : { count: oldEntry, customer: '', date: '', linkedTo: '' };

            // Alten Eintrag entfernen
            delete manualApplicants[oldKey];

            // Neuen Key mit Zielfunnel erstellen
            const [, monthIdx] = oldKey.split('|||');
            const newKey = targetFunnel + '|||' + monthIdx;

            if (manualApplicants[newKey]) {
                const existing = typeof manualApplicants[newKey] === 'object' ? manualApplicants[newKey] : { count: manualApplicants[newKey], customer: '', date: '', linkedTo: '' };
                existing.count += entry.count;
                manualApplicants[newKey] = existing;
            } else {
                entry.linkedTo = '';
                manualApplicants[newKey] = entry;
            }

            saveLocalStorage();
            loadData();
        }

        function saveManualEntry() {
            const funnelSelect = document.getElementById('manualFunnel').value;
            const newFunnel = document.getElementById('manualNewFunnel').value.trim();
            const count = parseInt(document.getElementById('manualCount').value) || 1;
            const dateVal = document.getElementById('manualDate').value;
            const customerSelect = document.getElementById('manualCustomerSelect')?.value || '';
            const customerNew = document.getElementById('manualCustomerNew')?.value?.trim() || '';

            const funnel = funnelSelect || newFunnel;
            if (!funnel) return;

            const customer = funnelSelect ? '' : (customerNew || customerSelect);

            // Datum zu Monatsindex zuordnen
            let monthIdx = (dashboardData.monthlyBreakdown || []).length - 1;
            if (dateVal) {
                const entryDate = new Date(dateVal);
                const breakdown = dashboardData.monthlyBreakdown || [];
                for (let i = 0; i < breakdown.length; i++) {
                    const mDate = new Date(breakdown[i].label);
                    if (!isNaN(mDate.getTime()) && entryDate.getFullYear() === mDate.getFullYear() && entryDate.getMonth() === mDate.getMonth()) {
                        monthIdx = i;
                        break;
                    }
                }
            }

            const key = funnel + '|||' + monthIdx;
            const existing = manualApplicants[key];
            if (existing && typeof existing === 'object') {
                existing.count += count;
                if (customer) existing.customer = customer;
                if (dateVal) existing.date = dateVal;
            } else {
                const prevCount = typeof existing === 'number' ? existing : 0;
                manualApplicants[key] = { count: prevCount + count, customer: customer, date: dateVal, linkedTo: '' };
            }

            // Customer Map aktualisieren bei neuer Kampagne
            if (!funnelSelect && customer) {
                if (!dashboardData.customerMap) dashboardData.customerMap = {};
                dashboardData.customerMap[funnel] = customer;
            }

            saveLocalStorage();
            applyManualApplicants();
            renderManualEntryList();
            renderTab(currentTab);
            document.getElementById('manualCount').value = '1';
            document.getElementById('manualNewFunnel').value = '';
        }

        function removeManualEntry(key) {
            delete manualApplicants[key];
            saveLocalStorage();
            loadData();
        }

        function findMatchingFunnel(manualName, customerName) {
            const clients = dashboardData.clients || [];
            const customerMap = dashboardData.customerMap || {};
            if (clients.length === 0) return null;

            // Exakter Match
            if (clients.includes(manualName)) return null; // kein Mapping noetig

            const manualWords = manualName.toLowerCase().replace(/[^a-zäöüß0-9\s]/g, ' ').split(/\s+/).filter(w => w.length > 2);
            if (manualWords.length === 0) return null;

            let bestMatch = null;
            let bestScore = 0;

            clients.forEach(funnel => {
                const funnelLower = funnel.toLowerCase();
                const funnelCustomer = (customerMap[funnel] || '').toLowerCase();

                // Wortbasiertes Matching: wie viele manuelle Woerter im echten Funnel vorkommen
                let wordMatches = 0;
                manualWords.forEach(w => {
                    if (funnelLower.includes(w)) wordMatches++;
                });
                const wordScore = manualWords.length > 0 ? wordMatches / manualWords.length : 0;

                // Kundenname Bonus: Wenn customerName angegeben und der echte Funnel dem gleichen Kunden gehoert
                let customerBonus = 0;
                if (customerName) {
                    const custLower = customerName.toLowerCase();
                    if (funnelCustomer === custLower || funnelLower.includes(custLower) || funnelCustomer.includes(custLower)) {
                        customerBonus = 0.3;
                    }
                }

                const totalScore = wordScore + customerBonus;

                // Mindestens 50% der Woerter muessen matchen (oder Kunde passt + mind. 1 Wort)
                if (totalScore > bestScore && (wordScore >= 0.5 || (customerBonus > 0 && wordMatches >= 1))) {
                    bestScore = totalScore;
                    bestMatch = funnel;
                }
            });

            return bestScore >= 0.5 ? bestMatch : null;
        }

        function autoMatchManualApplicants() {
            if (!dashboardData || !dashboardData.clients) return;
            let changed = false;
            const keysToProcess = Object.keys(manualApplicants);

            keysToProcess.forEach(key => {
                const val = manualApplicants[key];
                const entry = typeof val === 'object' ? val : { count: val, customer: '', date: '', linkedTo: '' };
                const [funnel, monthIdxStr] = key.split('|||');

                // Nur neue/unverknuepfte Eintraege die nicht direkt einem existierenden Funnel entsprechen
                if (dashboardData.clients.includes(funnel)) return;

                const match = findMatchingFunnel(funnel, entry.customer);
                if (match) {
                    // Automatisch umhängen auf den echten Funnel
                    const newKey = match + '|||' + monthIdxStr;
                    if (manualApplicants[newKey]) {
                        const existing = typeof manualApplicants[newKey] === 'object' ? manualApplicants[newKey] : { count: manualApplicants[newKey], customer: '', date: '', linkedTo: '' };
                        existing.count += entry.count;
                        manualApplicants[newKey] = existing;
                    } else {
                        manualApplicants[newKey] = { count: entry.count, customer: entry.customer, date: entry.date, linkedTo: '' };
                    }
                    delete manualApplicants[key];
                    changed = true;
                    console.log('[Auto Match] "' + funnel + '" automatisch zugeordnet zu "' + match + '"');
                }
            });

            if (changed) saveLocalStorage();
        }

        function applyManualApplicants() {
            if (!dashboardData || !dashboardData.monthlyBreakdown) return;

            // Erst Auto Match versuchen
            autoMatchManualApplicants();

            Object.entries(manualApplicants).forEach(([key, val]) => {
                const entry = typeof val === 'object' ? val : { count: val, customer: '', date: '', linkedTo: '' };
                const [funnel, monthIdxStr] = key.split('|||');
                const monthIdx = parseInt(monthIdxStr);
                const count = entry.count || 0;
                const breakdown = dashboardData.monthlyBreakdown;
                if (breakdown[monthIdx] && count > 0) {
                    if (!breakdown[monthIdx].data) breakdown[monthIdx].data = {};
                    if (!breakdown[monthIdx].data[funnel]) {
                        breakdown[monthIdx].data[funnel] = 0;
                        if (!dashboardData.clients.includes(funnel)) dashboardData.clients.push(funnel);
                    }
                    if (entry.customer && !dashboardData.customerMap[funnel]) {
                        dashboardData.customerMap[funnel] = entry.customer;
                    }
                    breakdown[monthIdx].data[funnel] += count;
                    breakdown[monthIdx].total = (breakdown[monthIdx].total || 0) + count;
                }
            });
        }

        init();
    </script>
</body>
</html>
