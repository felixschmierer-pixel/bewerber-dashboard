<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetings - Redline Grow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #DA2135;
            --color-primary-light: #E84A5C;
            --color-primary-dark: #A5192A;
            --bg-dark: #1A1A1A;
            --bg-darker: #111111;
            --bg-card: #2D2D2D;
            --bg-hover: #3a3a3a;
            --text-primary: #FFFFFF;
            --text-secondary: #d4d4d4;
            --text-muted: #8a8a8a;
            --border-color: #3a3a3a;
            --border-radius: 10px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        body.light-mode {
            --bg-dark: #FFFFFF;
            --bg-darker: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-hover: #f5f5f5;
            --text-primary: #1A1A1A;
            --text-secondary: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: var(--bg-darker);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-link {
            padding: 12px 16px;
            border-radius: var(--border-radius);
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--color-primary);
            color: #FFFFFF;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .theme-toggle {
            width: 100%;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-dark);
        }

        .header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px 40px;
            background: var(--bg-dark);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-primary);
        }

        /* Filters */
        .filters-section {
            padding: 20px 40px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(218, 33, 53, 0.1);
        }

        .filter-select {
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .filter-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .filter-checkbox label {
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Meetings List */
        .meetings-list {
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .meeting-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid transparent;
            border-radius: var(--border-radius);
            padding: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .meeting-card.geplant {
            border-left-color: var(--color-primary);
        }

        .meeting-card.vergangen {
            opacity: 0.7;
        }

        .meeting-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
            background: var(--bg-hover);
        }

        .meeting-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .meeting-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .meeting-customer {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .meeting-badges {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .badge-kundentermin {
            background: var(--color-primary);
            color: #FFFFFF;
        }

        .badge-trigger {
            background: rgba(218, 33, 53, 0.2);
            color: var(--color-primary-light);
            font-weight: 500;
            text-transform: none;
        }

        .badge-type {
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-kundengespraech { background: #1e3a8a; color: #93c5fd; }
        .badge-update { background: #1e40af; color: #93c5fd; }
        .badge-kickoff { background: #7c2d12; color: #fed7aa; }
        .badge-strategieberatung { background: #5b21b6; color: #e9d5ff; }
        .badge-followup { background: #0f766e; color: #99f6e4; }
        .badge-pitch { background: #7c3aed; color: #edd5f1; }
        .badge-closing { background: #059669; color: #a7f3d0; }
        .badge-internes { background: #4b5563; color: #c1c7d0; }
        .badge-vorqualifizierung { background: #ea580c; color: #fed7aa; }
        .badge-sonstiges { background: #475569; color: #cbd5e1; }

        .badge-source {
            background: rgba(100, 116, 139, 0.2);
            color: var(--text-secondary);
        }

        .badge-status {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .badge-status.vergangen {
            background: rgba(107, 114, 128, 0.2);
            color: #d1d5db;
        }

        .meeting-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meeting-participants {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .expand-toggle {
            display: inline-block;
            padding: 6px 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .expand-toggle:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #FFFFFF;
        }

        .meeting-expanded {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .meeting-expanded.show {
            display: block;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 12px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .summary-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .action-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .action-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .action-item.completed {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .link-button {
            display: inline-block;
            padding: 8px 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--color-primary-light);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .link-button:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #FFFFFF;
        }

        /* Sync Status */
        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .sync-indicator.syncing {
            background: var(--color-primary);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters-section {
                flex-direction: column;
                padding: 15px 20px;
            }

            .search-input {
                min-width: 100%;
            }

            .meetings-list {
                padding: 15px 20px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                display: grid;
                grid-template-columns: auto 1fr auto;
                align-items: center;
                padding: 15px 20px;
            }

            .sidebar-header {
                margin-bottom: 0;
            }

            .sidebar-nav {
                flex-direction: row;
                gap: 0;
                margin: 0 20px;
            }

            .nav-link {
                padding: 8px 12px;
                font-size: 13px;
            }

            .sidebar-footer {
                border-top: none;
                padding: 0;
            }

            .main-content {
                height: auto;
            }

            .sync-status {
                bottom: auto;
                right: auto;
                position: static;
            }
        }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Redline Grow</div>
            <div class="sidebar-nav">
                <a href="bewerber.html" class="nav-link">Bewerber</a>
                <a href="meetings.html" class="nav-link active">Meetings</a>
                <a href="tasks.html" class="nav-link">Aufgaben</a>
                <a href="intelligence.html" class="nav-link">Kundenintelligenz</a>
            </div>
            <div class="sidebar-footer">
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h1>Meetings</h1>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Kundentermine diese Woche</div>
                    <div class="stat-value" id="stat-week-customers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Kundentermine dieser Monat</div>
                    <div class="stat-value" id="stat-month-customers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Alle Meetings diese Woche</div>
                    <div class="stat-value" id="stat-week-all">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Alle Meetings dieser Monat</div>
                    <div class="stat-value" id="stat-month-all">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <input type="text" id="search-input" class="search-input" placeholder="Nach Titel, Kunde oder Typ suchen..." onkeyup="applyFilters()">
                <select id="type-filter" class="filter-select" onchange="applyFilters()">
                    <option value="">Alle Typen</option>
                    <option value="kundengespraech">Kundengespraech</option>
                    <option value="update">Update Meeting</option>
                    <option value="kickoff">Kick Off</option>
                    <option value="strategieberatung">Strategieberatung</option>
                    <option value="followup">Follow Up</option>
                    <option value="pitch">Pitch</option>
                    <option value="closing">Closing</option>
                    <option value="internes">Internes Meeting</option>
                    <option value="vorqualifizierung">Bewerber Vorqualifizierung</option>
                    <option value="sonstiges">Sonstiges</option>
                </select>
                <div class="filter-checkbox">
                    <input type="checkbox" id="customer-only" onchange="applyFilters()">
                    <label for="customer-only">Nur Kundentermine</label>
                </div>
            </div>

            <!-- Meetings List -->
            <div class="meetings-list" id="meetings-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">Keine Meetings gefunden. Bitte warten Sie auf Daten...</div>
                </div>
            </div>

            <!-- Sync Status -->
            <div class="sync-status">
                <div class="sync-indicator" id="sync-indicator"></div>
                <span id="sync-text">Synchronisiert</span>
            </div>
        </div>
    </div>

    <script>
        const N8N_MEETINGS_API = localStorage.getItem('n8n_meetings_api_url') || 'https://redline-grow.app.n8n.cloud/webhook/meetings-api';

        let allMeetings = [];
        let refreshInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMeetings();
            refreshInterval = setInterval(loadMeetings, 5 * 60 * 1000); // Auto-refresh every 5 minutes
        });

        // Load meetings from API
        async function loadMeetings() {
            setSyncStatus(true);
            try {
                const response = await fetch(N8N_MEETINGS_API);
                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                allMeetings = (Array.isArray(data) ? data : data.meetings || [])
                    .map(mapApiMeeting)
                    .sort(sortMeetings);

                renderMeetings();
                updateStats();
                setSyncStatus(false);
            } catch (error) {
                console.error('Failed to load meetings:', error);
                setSyncStatus(false, 'Fehler beim Laden');
            }
        }

        // Map API response to meeting object
        function mapApiMeeting(row) {
            let dateFormatted = row.datum || '';
            if (dateFormatted.includes('.')) {
                const parts = dateFormatted.split('.');
                if (parts.length === 3) dateFormatted = parts[2] + '-' + parts[1] + '-' + parts[0];
            }

            return {
                id: 'api_' + (row.meeting_id || row.id || Math.random().toString(36).substr(2)),
                customer: row.kunde || row.titel || 'Unbekannt',
                titel: row.titel || '',
                date: dateFormatted,
                type: row.typ || 'Sonstiges',
                summary: row.zusammenfassung || '',
                actionItems: row.action_items ? row.action_items.split('\n').filter(t => t.trim()).map(t => ({ text: t.trim(), completed: false })) : [],
                recordingLink: row.recording_link || null,
                createdAt: row.datum || new Date().toISOString(),
                _source: 'api',
                teilnehmer: row.teilnehmer || '',
                startzeit: row.startzeit || '',
                endzeit: row.endzeit || '',
                teamsLink: row.teams_link || '',
                quelle: row.quelle || '',
                gcalId: row.gcal_event_id || '',
                calendlyUri: row.calendly_uri || '',
                istKundentermin: row.ist_kundentermin || false,
                triggerWort: row.trigger_wort || '',
                status: row.status || 'geplant'
            };
        }

        // Sort meetings
        function sortMeetings(a, b) {
            const statusOrder = { 'geplant': 0, 'laufend': 1, 'vergangen': 2 };
            const aStatus = statusOrder[a.status] ?? 3;
            const bStatus = statusOrder[b.status] ?? 3;

            if (aStatus !== bStatus) return aStatus - bStatus;

            const dateA = new Date(a.date);
            const dateB = new Date(b.date);

            if (a.status === 'vergangen') {
                return dateB - dateA; // Descending for past
            }
            return dateA - dateB; // Ascending for upcoming
        }

        // Apply filters
        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const typeFilter = document.getElementById('type-filter').value.toLowerCase();
            const customerOnly = document.getElementById('customer-only').checked;

            const filtered = allMeetings.filter(meeting => {
                const matchesSearch = !search ||
                    meeting.titel.toLowerCase().includes(search) ||
                    meeting.customer.toLowerCase().includes(search) ||
                    meeting.type.toLowerCase().includes(search);

                const matchesType = !typeFilter || meeting.type.toLowerCase() === typeFilter;
                const matchesCustomer = !customerOnly || meeting.istKundentermin;

                return matchesSearch && matchesType && matchesCustomer;
            });

            renderMeetingCards(filtered);
        }

        // Render meetings
        function renderMeetings() {
            const container = document.getElementById('meetings-list');

            if (allMeetings.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Keine Meetings gefunden</div></div>';
                return;
            }

            renderMeetingCards(allMeetings);
        }

        // Render meeting cards
        function renderMeetingCards(meetings) {
            const container = document.getElementById('meetings-list');

            if (meetings.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">Keine Meetings entsprechen Ihren Filtern</div></div>';
                return;
            }

            container.innerHTML = meetings.map(m => createMeetingCard(m)).join('');

            // Add event listeners
            document.querySelectorAll('.expand-toggle').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.meeting-card');
                    const expanded = card.querySelector('.meeting-expanded');
                    expanded.classList.toggle('show');
                    btn.textContent = expanded.classList.contains('show') ? 'Weniger anzeigen' : 'Mehr anzeigen';
                });
            });
        }

        // Create meeting card HTML
        function createMeetingCard(meeting) {
            const typeClass = 'badge-' + meeting.type.toLowerCase().replace(/\s+/g, '');
            const statusClass = meeting.status === 'vergangen' ? 'vergangen' : '';
            const time = meeting.startzeit && meeting.endzeit ? `${meeting.startzeit} - ${meeting.endzeit}` : meeting.date;

            return `
                <div class="meeting-card ${meeting.status}">
                    <div class="meeting-card-header">
                        <div>
                            <div class="meeting-title">${escapeHtml(meeting.titel)}</div>
                            <div class="meeting-customer">${escapeHtml(meeting.customer)}</div>
                        </div>
                    </div>

                    <div class="meeting-badges">
                        ${meeting.istKundentermin ? '<span class="badge badge-kundentermin">Kundentermin</span>' : ''}
                        ${meeting.triggerWort ? `<span class="badge badge-trigger">${escapeHtml(meeting.triggerWort)}</span>` : ''}
                        <span class="badge badge-type ${typeClass}">${escapeHtml(meeting.type)}</span>
                        ${meeting.quelle ? `<span class="badge badge-source">${escapeHtml(meeting.quelle)}</span>` : ''}
                        <span class="badge badge-status ${statusClass}">${escapeHtml(meeting.status)}</span>
                    </div>

                    <div class="meeting-meta">
                        <div class="meta-item">📅 ${escapeHtml(time)}</div>
                        ${meeting.teilnehmer ? `<div class="meta-item">👥 ${escapeHtml(meeting.teilnehmer)}</div>` : ''}
                    </div>

                    ${meeting.summary || meeting.actionItems.length > 0 || meeting.teamsLink || meeting.recordingLink ? `
                        <button class="expand-toggle">Mehr anzeigen</button>
                    ` : ''}

                    <div class="meeting-expanded">
                        ${meeting.summary ? `
                            <div class="section-label">Zusammenfassung</div>
                            <div class="summary-text">${escapeHtml(meeting.summary)}</div>
                        ` : ''}

                        ${meeting.actionItems.length > 0 ? `
                            <div class="section-label">Action Items</div>
                            <div class="action-items">
                                ${meeting.actionItems.map((item, idx) => `
                                    <div class="action-item ${item.completed ? 'completed' : ''}">
                                        <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleActionItem('${meeting.id}', ${idx})">
                                        <span>${escapeHtml(item.text)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        ${meeting.teamsLink ? `
                            <div style="margin-top: 12px;">
                                <a href="${escapeHtml(meeting.teamsLink)}" target="_blank" class="link-button">Teams Link öffnen</a>
                            </div>
                        ` : ''}

                        ${meeting.recordingLink ? `
                            <div style="margin-top: 8px;">
                                <a href="${escapeHtml(meeting.recordingLink)}" target="_blank" class="link-button">Aufzeichnung ansehen</a>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Update stats
        function updateStats() {
            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);

            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);

            let weekCustomers = 0, monthCustomers = 0, weekAll = 0, monthAll = 0;

            allMeetings.forEach(m => {
                const date = new Date(m.date);
                const isWeek = date >= weekStart && date <= weekEnd;
                const isMonth = date >= monthStart && date <= monthEnd;

                if (m.istKundentermin) {
                    if (isWeek) weekCustomers++;
                    if (isMonth) monthCustomers++;
                }
                if (isWeek) weekAll++;
                if (isMonth) monthAll++;
            });

            document.getElementById('stat-week-customers').textContent = weekCustomers;
            document.getElementById('stat-month-customers').textContent = monthCustomers;
            document.getElementById('stat-week-all').textContent = weekAll;
            document.getElementById('stat-month-all').textContent = monthAll;
        }

        // Toggle action item
        function toggleActionItem(meetingId, itemIdx) {
            const meeting = allMeetings.find(m => m.id === meetingId);
            if (meeting && meeting.actionItems[itemIdx]) {
                meeting.actionItems[itemIdx].completed = !meeting.actionItems[itemIdx].completed;
            }
        }

        // Toggle theme
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark-mode');
            body.classList.toggle('dark-mode');
            body.classList.toggle('light-mode');

            const btn = document.querySelector('.theme-toggle');
            btn.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';

            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // Set sync status
        function setSyncStatus(syncing, text = null) {
            const indicator = document.getElementById('sync-indicator');
            const statusText = document.getElementById('sync-text');

            if (syncing) {
                indicator.classList.add('syncing');
                statusText.textContent = text || 'Synchronisiere...';
            } else {
                indicator.classList.remove('syncing');
                statusText.textContent = text || 'Synchronisiert';
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle').textContent = '☀️ Light Mode';
        }
    </script>
</body>
</html>
