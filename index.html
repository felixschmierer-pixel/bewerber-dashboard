<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewerber Meetovo Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #6366f1;
            --color-primary-light: #818cf8;
            --color-primary-dark: #4f46e5;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-info: #3b82f6;
            --bg-dark: #0f172a;
            --bg-darker: #1e293b;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        body.light-mode {
            --bg-dark: #f8fafc;
            --bg-darker: #f1f5f9;
            --bg-card: #ffffff;
            --bg-hover: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--bg-darker);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .sidebar-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            user-select: none;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--color-primary);
            color: white;
            border-left-color: var(--color-primary-light);
        }

        .theme-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--color-primary);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
        }

        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }

        .sync-dot.syncing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-filter {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .client-filter:hover {
            border-color: var(--color-primary);
        }

        .tabs {
            display: flex;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
            overflow-x: auto;
            gap: 20px;
        }

        .tab {
            padding: 15px 0;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-sm);
        }

        .kpi-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .kpi-change {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .kpi-change.positive {
            color: var(--color-success);
        }

        .kpi-change.negative {
            color: var(--color-danger);
        }

        .kpi-change.neutral {
            color: var(--text-muted);
        }

        .alert-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }

        .alert-item {
            background: var(--bg-card);
            border-left: 4px solid var(--color-warning);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .alert-item.critical {
            border-left-color: var(--color-danger);
        }

        .alert-item.good {
            border-left-color: var(--color-success);
            opacity: 0.6;
        }

        .alert-content {
            flex: 1;
        }

        .alert-customer {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .alert-funnel {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .alert-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .alert-days {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-danger);
            min-width: 50px;
            text-align: right;
        }

        .alert-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
            margin-right: 10px;
        }

        .alert-dot.critical {
            background: var(--color-danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .alert-dot.warning {
            background: var(--color-warning);
        }

        .alert-dot.good {
            background: var(--color-success);
        }

        .alert-dismiss {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            margin-left: 10px;
            transition: color 0.3s ease;
        }

        .alert-dismiss:hover {
            color: var(--color-danger);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-darker);
            padding: 15px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
        }

        th:hover {
            background: var(--bg-hover);
        }

        th.sortable:after {
            content: " \2191";
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        th.sortable:hover:after {
            opacity: 0.5;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tr:hover {
            background: var(--bg-hover);
        }

        tr.paused {
            opacity: 0.6;
            background: var(--bg-darker);
        }

        tr.filled {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .health-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .health-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .health-dot.good {
            background: var(--color-success);
        }

        .health-dot.warning {
            background: var(--color-warning);
        }

        .health-dot.danger {
            background: var(--color-danger);
        }

        .trend-arrow {
            font-size: 16px;
            font-weight: 700;
        }

        .trend-arrow.up {
            color: var(--color-success);
        }

        .trend-arrow.down {
            color: var(--color-danger);
        }

        .trend-arrow.stable {
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .status-paused {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }

        .status-filled {
            background: rgba(107, 114, 128, 0.2);
            color: var(--text-muted);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .btn.primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .btn.primary:hover {
            background: var(--color-primary-dark);
        }

        .btn.success {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .btn.success:hover {
            background: var(--color-success);
            color: white;
        }

        .btn.warning {
            background: rgba(245, 158, 11, 0.2);
            border-color: var(--color-warning);
            color: var(--color-warning);
        }

        .btn.warning:hover {
            background: var(--color-warning);
            color: white;
        }

        .btn.danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .btn.danger:hover {
            background: var(--color-danger);
            color: white;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 11px;
        }

        .campaign-counter {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-darker);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .counter-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .counter-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .counter-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            height: 400px;
        }

        .recent-applicants {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .applicant-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }

        .applicant-item:hover {
            background: var(--bg-hover);
        }

        .applicant-item:last-child {
            border-bottom: none;
        }

        .applicant-info {
            flex: 1;
        }

        .applicant-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .applicant-details {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }

        .applicant-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .settings-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .setting-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .setting-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: block;
        }

        .setting-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input {
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cost-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .cost-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .cost-card:hover {
            border-color: var(--color-primary);
        }

        .cost-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .cost-campaign {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .cost-rating {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .cost-rating.good {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
        }

        .cost-rating.medium {
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
        }

        .cost-rating.bad {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .cost-row:last-child {
            border-bottom: none;
        }

        .cost-label {
            color: var(--text-muted);
        }

        .cost-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .instructions {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .instruction-section {
            margin-bottom: 30px;
        }

        .instruction-section:last-child {
            margin-bottom: 0;
        }

        .instruction-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .instruction-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .code-block {
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--color-primary-light);
            margin: 10px 0;
            overflow-x: auto;
            user-select: all;
        }

        .copy-btn {
            display: inline-block;
            background: var(--color-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            border: none;
            transition: background 0.3s ease;
            margin-top: 8px;
        }

        .copy-btn:hover {
            background: var(--color-primary-dark);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--text-primary);
        }

        @media (max-width: 1200px) {
            .sidebar {
                width: 200px;
                padding: 15px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .alert-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 15px;
                max-height: 60px;
                overflow: hidden;
            }

            .sidebar-nav {
                display: none;
            }

            .theme-toggle {
                position: static;
                margin-top: 10px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                flex-wrap: wrap;
            }

            .tabs {
                flex-wrap: nowrap;
                padding: 0 10px;
                gap: 10px;
            }

            .content {
                padding: 10px;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .alert-grid {
                grid-template-columns: 1fr;
            }

            .cost-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                📊 Meetovo
            </div>
            <div class="sidebar-nav">
                <div class="nav-item active" data-tab="overview">Uebersicht</div>
                <div class="nav-item" data-tab="today">Heute</div>
                <div class="nav-item" data-tab="yesterday">Gestern</div>
                <div class="nav-item" data-tab="week">Woche</div>
                <div class="nav-item" data-tab="month">Monat</div>
                <div class="nav-item" data-tab="monthly">Monatsvergleich</div>
                <div class="nav-item" data-tab="campaigns">Kampagnen</div>
                <div class="nav-item" data-tab="costs">Kosten</div>
                <div class="nav-item" data-tab="instructions">Anleitung</div>
            </div>
            <button class="theme-toggle" id="themeToggle">Nachtmodus</button>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="header-left">
                    <div class="header-title" id="pageTitle">Uebersicht</div>
                    <div class="sync-indicator">
                        <div class="sync-dot" id="syncDot"></div>
                        <span id="lastSync">Synchronisierung...</span>
                    </div>
                </div>
                <div class="header-controls">
                    <select class="client-filter" id="clientFilter">
                        <option value="">Alle Kunden</option>
                    </select>
                </div>
            </div>

            <div class="tabs" id="tabBar"></div>

            <div class="content" id="contentArea">
                <!-- Dynamically loaded content -->
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzVJ7QUO8dOEbtxmql11OCjlmBI8Ene7CfTghoI2nvSnGvt-wpMpx3tkO6cDrNhR0OgtA/exec';

        let API_URL = DEFAULT_API_URL;
        let dashboardData = null;
        let campaignStatuses = {};
        let dismissedAlerts = [];
        let costSettings = {};
        let charts = {};
        let currentTab = 'overview';
        let currentClient = '';

        const TABS = [
            { id: 'overview', label: 'Uebersicht' },
            { id: 'today', label: 'Heute' },
            { id: 'yesterday', label: 'Gestern' },
            { id: 'week', label: 'Woche' },
            { id: 'month', label: 'Monat' },
            { id: 'monthly', label: 'Monatsvergleich' },
            { id: 'campaigns', label: 'Kampagnen' },
            { id: 'costs', label: 'Kosten' },
            { id: 'instructions', label: 'Anleitung' }
        ];

        function init() {
            const params = new URLSearchParams(window.location.search);
            const apiParam = params.get('api');
            if (apiParam) API_URL = apiParam;

            loadLocalStorage();
            initTheme();
            initNavigation();
            loadData();
            setInterval(loadData, 5 * 60 * 1000);
        }

        function loadLocalStorage() {
            const statuses = localStorage.getItem('campaignStatuses');
            if (statuses) campaignStatuses = JSON.parse(statuses);

            const alerts = localStorage.getItem('dismissedAlerts');
            if (alerts) dismissedAlerts = JSON.parse(alerts);

            const costs = localStorage.getItem('costSettings');
            if (costs) costSettings = JSON.parse(costs);
        }

        function saveLocalStorage() {
            localStorage.setItem('campaignStatuses', JSON.stringify(campaignStatuses));
            localStorage.setItem('dismissedAlerts', JSON.stringify(dismissedAlerts));
            localStorage.setItem('costSettings', JSON.stringify(costSettings));
        }

        function initTheme() {
            const theme = localStorage.getItem('dashboardTheme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').textContent = 'Tagesmodus';
            }

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const newTheme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
                localStorage.setItem('dashboardTheme', newTheme);
                document.getElementById('themeToggle').textContent = newTheme === 'light' ? 'Nachtmodus' : 'Tagesmodus';
            });
        }

        function initNavigation() {
            const tabBar = document.getElementById('tabBar');
            TABS.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab' + (tab.id === currentTab ? ' active' : '');
                tabEl.textContent = tab.label;
                tabEl.addEventListener('click', () => switchTab(tab.id));
                tabBar.appendChild(tabEl);
            });

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const tabId = item.dataset.tab;
                    switchTab(tabId);
                });
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));

            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((t, i) => {
                if (TABS[i].id === tabId) t.classList.add('active');
            });

            const activeNav = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (activeNav) activeNav.classList.add('active');

            const tabLabel = TABS.find(t => t.id === tabId)?.label || '';
            document.getElementById('pageTitle').textContent = tabLabel;

            renderTab(tabId);
        }

        function loadData() {
            const syncDot = document.getElementById('syncDot');
            syncDot.classList.add('syncing');

            fetch(`${API_URL}?action=dashboard`)
                .then(r => r.json())
                .then(data => {
                    dashboardData = data;
                    updateClientFilter();
                    renderTab(currentTab);
                    updateLastSync();
                    syncDot.classList.remove('syncing');
                })
                .catch(err => {
                    console.error('API Error:', err);
                    syncDot.style.background = '#ef4444';
                    document.getElementById('lastSync').textContent = 'Fehler beim Laden';
                });
        }

        function updateLastSync() {
            const now = new Date();
            const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastSync').textContent = `Aktualisiert: ${time}`;
        }

        function updateClientFilter() {
            const select = document.getElementById('clientFilter');
            const clients = [...new Set(dashboardData.clients || [])];
            const current = select.value;

            while (select.options.length > 1) {
                select.remove(1);
            }

            clients.forEach(client => {
                const opt = document.createElement('option');
                opt.value = client;
                opt.textContent = dashboardData.customerMap[client] || client;
                select.appendChild(opt);
            });

            select.value = current;
            select.addEventListener('change', (e) => {
                currentClient = e.target.value;
                renderTab(currentTab);
            });
        }

        function renderTab(tabId) {
            const content = document.getElementById('contentArea');

            if (tabId === 'overview') renderOverview(content);
            else if (tabId === 'today') renderDayTab(content, 'today');
            else if (tabId === 'yesterday') renderDayTab(content, 'yesterday');
            else if (tabId === 'week') renderPeriodTab(content, 'thisWeek', 'Woche');
            else if (tabId === 'month') renderPeriodTab(content, 'thisMonth', 'Monat');
            else if (tabId === 'monthly') renderMonthlyTab(content);
            else if (tabId === 'campaigns') renderCampaignsTab(content);
            else if (tabId === 'costs') renderCostsTab(content);
            else if (tabId === 'instructions') renderInstructions(content);
        }

        function renderOverview(container) {
            const html = `
                <div class="kpi-grid" id="overviewKpis"></div>
                <div id="alertPanel"></div>
                <div class="section-title">Kampagnengesundheit</div>
                <div class="table-container" id="healthTable"></div>
                <div class="section-title">Aktuelle Bewerber</div>
                <div class="recent-applicants" id="recentApplicants"></div>
            `;
            container.innerHTML = html;

            renderOverviewKpis();
            renderAlertPanel();
            renderHealthTable(10);
            renderRecentApplicants(10);
        }

        function renderOverviewKpis() {
            const kpis = document.getElementById('overviewKpis');
            const data = dashboardData;

            const todayTotal = getFilteredValue(data.today);
            const yesterdayTotal = getFilteredValue(data.yesterday);
            const weekTotal = getFilteredValue(data.thisWeek);
            const monthTotal = getFilteredValue(data.thisMonth);

            const avgPerDay = monthTotal > 0 ? (monthTotal / 31).toFixed(1) : 0;
            const activeCampaigns = Object.keys(campaignStatuses).filter(k => campaignStatuses[k] === 'active').length || data.clients.length;
            const alertsCount = getAlertsCount();
            const bestCampaign = getBestCampaign();

            const change24h = yesterdayTotal > 0 ? (((todayTotal - yesterdayTotal) / yesterdayTotal) * 100).toFixed(0) : 0;
            const changeWeek = weekTotal > 0 ? (((todayTotal - (weekTotal / 7)) / (weekTotal / 7)) * 100).toFixed(0) : 0;

            const kpiData = [
                { label: 'Heute', value: todayTotal, change: change24h, changeType: 'vs gestern' },
                { label: 'Gestern', value: yesterdayTotal, change: changeWeek, changeType: 'vs Durchschnitt' },
                { label: 'Woche', value: weekTotal, change: 0, changeType: '' },
                { label: 'Monat', value: monthTotal, change: 0, changeType: '' },
                { label: 'Durchschnitt pro Tag', value: avgPerDay, change: 0, changeType: '' },
                { label: 'Aktive Kampagnen', value: activeCampaigns, change: 0, changeType: '' },
                { label: 'Alarme', value: alertsCount, change: 0, changeType: '' },
                { label: 'Beste Kampagne', value: bestCampaign || '.', change: 0, changeType: '' }
            ];

            kpis.innerHTML = kpiData.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value">${kpi.value}</div>
                    ${kpi.change !== 0 ? `
                        <div class="kpi-change ${parseInt(kpi.change) >= 0 ? 'positive' : 'negative'}">
                            <span class="trend-arrow ${parseInt(kpi.change) > 0 ? 'up' : parseInt(kpi.change) < 0 ? 'down' : 'stable'}">
                                ${parseInt(kpi.change) > 0 ? '↑' : parseInt(kpi.change) < 0 ? '↓' : '→'}
                            </span>
                            ${Math.abs(kpi.change)}% ${kpi.changeType}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderAlertPanel() {
            const panel = document.getElementById('alertPanel');
            const alerts = calculateAlerts();

            if (alerts.length === 0) {
                panel.innerHTML = `
                    <div class="alert-panel">
                        <div class="alert-title">
                            ✓ Kampagnen Alarm
                        </div>
                        <div style="padding: 20px; text-align: center; color: var(--color-success);">
                            Alle Kampagnen sind in guter Verfassung!
                        </div>
                    </div>
                `;
                return;
            }

            panel.innerHTML = `
                <div class="alert-panel">
                    <div class="alert-title">
                        ⚠ Kampagnen Alarm (${alerts.length})
                    </div>
                    <div class="alert-grid">
                        ${alerts.map((alert, idx) => `
                            <div class="alert-item ${alert.severity === 'critical' ? 'critical' : alert.severity === 'warning' ? '' : 'good'}">
                                <div class="alert-dot ${alert.severity === 'critical' ? 'critical' : alert.severity === 'warning' ? 'warning' : 'good'}"></div>
                                <div class="alert-content">
                                    <div class="alert-customer">${alert.customer}</div>
                                    <div class="alert-funnel">${alert.funnel}</div>
                                    <div class="alert-date">Letzte: ${alert.lastDate}</div>
                                </div>
                                <div class="alert-days">${alert.daysSince} Tage</div>
                                <button class="alert-dismiss" onclick="dismissAlert('${alert.funnel}')">X</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function calculateAlerts() {
            const alerts = [];
            const customers = {};

            dashboardData.recentApplicants.forEach(app => {
                if (!customers[app.client]) {
                    customers[app.client] = app;
                }
            });

            dashboardData.clients.forEach(funnel => {
                if (dismissedAlerts.includes(funnel)) return;
                if (campaignStatuses[funnel] !== 'active' && campaignStatuses[funnel]) return;

                const lastApp = dashboardData.recentApplicants.find(a => a.client === funnel);
                const daysSince = lastApp ? calculateDaysSince(lastApp.date) : 999;

                let severity = 'good';
                if (daysSince >= 7) severity = 'critical';
                else if (daysSince >= 4) severity = 'warning';

                if (severity !== 'good') {
                    alerts.push({
                        funnel,
                        customer: dashboardData.customerMap[funnel] || funnel,
                        lastDate: lastApp ? lastApp.date : 'Keine',
                        daysSince,
                        severity
                    });
                }
            });

            return alerts.sort((a, b) => {
                const severityOrder = { critical: 0, warning: 1, good: 2 };
                return severityOrder[a.severity] - severityOrder[b.severity];
            });
        }

        function dismissAlert(funnel) {
            if (!dismissedAlerts.includes(funnel)) {
                dismissedAlerts.push(funnel);
                saveLocalStorage();
                renderAlertPanel();
            }
        }

        function calculateDaysSince(dateStr) {
            try {
                const [datePart, timePart] = dateStr.split(' ');
                const [day, month, year] = datePart.split('.');
                const date = new Date(year, month - 1, day);
                const now = new Date();
                const diff = now - date;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            } catch (e) {
                return 999;
            }
        }

        function renderHealthTable(limit) {
            const table = document.getElementById('healthTable');
            const data = dashboardData;

            const healthRows = data.clients.map(funnel => {
                const customer = data.customerMap[funnel] || funnel;
                const monthData = getFilteredValue(data.thisMonth, funnel);
                const weekData = getFilteredValue(data.thisWeek, funnel);
                const lastApp = data.recentApplicants.find(a => a.client === funnel);
                const daysSince = lastApp ? calculateDaysSince(lastApp.date) : '.';

                let healthStatus = 'good';
                if (daysSince >= 7) healthStatus = 'danger';
                else if (daysSince >= 4) healthStatus = 'warning';

                const trend = monthData > weekData ? 'up' : monthData < weekData ? 'down' : 'stable';

                return {
                    funnel, customer, monthData, weekData, lastApp: lastApp ? lastApp.date : '.', daysSince, healthStatus, trend
                };
            }).sort((a, b) => b.monthData - a.monthData).slice(0, limit);

            table.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Kunde</th>
                            <th>Position</th>
                            <th>Gesundheit</th>
                            <th>Diese Woche</th>
                            <th>Dieser Monat</th>
                            <th>Trend</th>
                            <th>Tage ohne Bewerbung</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${healthRows.map(row => `
                            <tr class="${campaignStatuses[row.funnel] === 'paused' ? 'paused' : campaignStatuses[row.funnel] === 'filled' ? 'filled' : ''}">
                                <td>${row.customer}</td>
                                <td style="font-size: 12px; color: var(--text-muted);">${row.funnel}</td>
                                <td>
                                    <div class="health-indicator">
                                        <div class="health-dot ${row.healthStatus}"></div>
                                        ${row.healthStatus === 'good' ? 'Gut' : row.healthStatus === 'warning' ? 'Warnung' : 'Kritisch'}
                                    </div>
                                </td>
                                <td>${row.weekData}</td>
                                <td><strong>${row.monthData}</strong></td>
                                <td>
                                    <div class="trend-arrow ${row.trend}">
                                        ${row.trend === 'up' ? '↑' : row.trend === 'down' ? '↓' : '→'}
                                    </div>
                                </td>
                                <td>${row.daysSince}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderRecentApplicants(limit) {
            const container = document.getElementById('recentApplicants');
            const filtered = dashboardData.recentApplicants.slice(0, limit);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👤</div>Keine Bewerber</div>';
                return;
            }

            container.innerHTML = filtered.map(app => `
                <div class="applicant-item">
                    <div class="applicant-info">
                        <div class="applicant-name">${app.name}</div>
                        <div class="applicant-details">
                            <span>${dashboardData.customerMap[app.client] || app.client}</span>
                            <span>${app.city}</span>
                            <span>${app.client}</span>
                        </div>
                    </div>
                    <div class="applicant-date">${app.date}</div>
                </div>
            `).join('');
        }

        function renderDayTab(container, dayKey) {
            const data = dashboardData[dayKey] || {};
            const total = getFilteredValue(dashboardData[dayKey + 'Total']);

            let html = `
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-label">Bewerber gesamt</div>
                        <div class="kpi-value">${total}</div>
                    </div>
                </div>
                <div class="section-title">Nach Kampagne</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Kampagne</th>
                                <th>Bewerber</th>
                                <th>Prozentanteil</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            const rows = Object.entries(data)
                .filter(([key, val]) => {
                    if (!currentClient) return true;
                    return key === currentClient;
                })
                .sort((a, b) => b[1] - a[1]);

            rows.forEach(([funnel, count]) => {
                const pct = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                html += `
                    <tr>
                        <td>${dashboardData.customerMap[funnel] || funnel}</td>
                        <td><strong>${count}</strong></td>
                        <td>${pct}%</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderPeriodTab(container, periodKey, label) {
            const data = dashboardData[periodKey] || {};
            const total = getFilteredValue(dashboardData[periodKey.replace('this', '') + 'Total']);

            let html = `
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-label">Bewerber ${label.toLowerCase()}</div>
                        <div class="kpi-value">${total}</div>
                    </div>
                </div>
                <div class="section-title">Nach Kampagne</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Kampagne</th>
                                <th>Bewerber</th>
                                <th>Prozentanteil</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            const rows = Object.entries(data)
                .filter(([key, val]) => {
                    if (!currentClient) return true;
                    return key === currentClient;
                })
                .sort((a, b) => b[1] - a[1]);

            rows.forEach(([funnel, count]) => {
                const pct = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                html += `
                    <tr>
                        <td>${dashboardData.customerMap[funnel] || funnel}</td>
                        <td><strong>${count}</strong></td>
                        <td>${pct}%</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderMonthlyTab(container) {
            const breakdown = dashboardData.monthlyBreakdown || [];

            container.innerHTML = `
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            `;

            if (breakdown.length === 0) return;

            setTimeout(() => {
                const ctx = document.getElementById('monthlyChart');
                if (charts.monthly) charts.monthly.destroy();

                const labels = breakdown.map(m => m.label);
                const totals = breakdown.map(m => m.total);

                charts.monthly = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Bewerber',
                            data: totals,
                            backgroundColor: 'rgba(99, 102, 241, 0.5)',
                            borderColor: 'rgba(99, 102, 241, 1)',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });
            }, 100);
        }

        function renderCampaignsTab(container) {
            const activeCampaigns = dashboardData.clients.filter(c => !campaignStatuses[c] || campaignStatuses[c] === 'active').length;
            const pausedCampaigns = dashboardData.clients.filter(c => campaignStatuses[c] === 'paused').length;
            const filledCampaigns = dashboardData.clients.filter(c => campaignStatuses[c] === 'filled').length;

            let html = `
                <div class="campaign-counter">
                    <div class="counter-item">
                        <div class="counter-label">Aktiv</div>
                        <div class="counter-value">${activeCampaigns}</div>
                    </div>
                    <div class="counter-item">
                        <div class="counter-label">Pausiert</div>
                        <div class="counter-value">${pausedCampaigns}</div>
                    </div>
                    <div class="counter-item">
                        <div class="counter-label">Besetzt</div>
                        <div class="counter-value">${filledCampaigns}</div>
                    </div>
                </div>

                <div class="filter-controls">
                    <button class="filter-btn active" onclick="filterCampaigns('all')">Alle</button>
                    <button class="filter-btn" onclick="filterCampaigns('active')">Aktiv</button>
                    <button class="filter-btn" onclick="filterCampaigns('paused')">Pausiert</button>
                    <button class="filter-btn" onclick="filterCampaigns('filled')">Besetzt</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Kunde</th>
                                <th>Position</th>
                                <th>Status</th>
                                <th>Diese Woche</th>
                                <th>Dieser Monat</th>
                                <th>Aktion</th>
                            </tr>
                        </thead>
                        <tbody id="campaignsBody">
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
            filterCampaigns('all');
        }

        function filterCampaigns(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`button[onclick="filterCampaigns('${filter}')"]`).classList.add('active');

            const body = document.getElementById('campaignsBody');
            const rows = dashboardData.clients.map(funnel => {
                const customer = dashboardData.customerMap[funnel] || funnel;
                const status = campaignStatuses[funnel] || 'active';
                const monthData = getFilteredValue(dashboardData.thisMonth, funnel);
                const weekData = getFilteredValue(dashboardData.thisWeek, funnel);

                if (filter !== 'all' && status !== filter) return null;

                return `
                    <tr class="${status === 'paused' ? 'paused' : status === 'filled' ? 'filled' : ''}">
                        <td>${customer}</td>
                        <td style="font-size: 12px; color: var(--text-muted);">${funnel}</td>
                        <td>
                            <span class="status-badge status-${status}">
                                ${status === 'active' ? 'Aktiv' : status === 'paused' ? 'Pausiert' : 'Besetzt'}
                            </span>
                        </td>
                        <td>${weekData}</td>
                        <td><strong>${monthData}</strong></td>
                        <td>
                            <div class="btn-group">
                                ${status !== 'active' ? `<button class="btn btn-small btn-success" onclick="setCampaignStatus('${funnel}', 'active')">Aktiv</button>` : ''}
                                ${status !== 'paused' ? `<button class="btn btn-small btn-warning" onclick="setCampaignStatus('${funnel}', 'paused')">Pausieren</button>` : ''}
                                ${status !== 'filled' ? `<button class="btn btn-small btn-danger" onclick="setCampaignStatus('${funnel}', 'filled')">Besetzt</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).filter(r => r).join('');

            body.innerHTML = rows || '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Keine Kampagnen gefunden</td></tr>';
        }

        function setCampaignStatus(funnel, status) {
            campaignStatuses[funnel] = status;
            saveLocalStorage();
            filterCampaigns(document.querySelector('.filter-btn.active').onclick.toString().match(/'(\w+)'/)[1]);
            renderAlertPanel();
        }

        function renderCostsTab(container) {
            const defaultBudgetPerDay = costSettings.budgetPerDay || 20;

            let html = `
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Tagesbudget pro Kampagne</label>
                        <div class="setting-description">Standard: 20 Euro pro Tag und Kampagne</div>
                        <div class="input-group">
                            <input type="number" class="input" id="budgetInput" value="${defaultBudgetPerDay}" min="1" step="1">
                            <span>Euro</span>
                            <button class="btn btn-primary btn-small" onclick="saveBudgetSetting()">Speichern</button>
                        </div>
                    </div>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-label">Gesamtbudget (30 Tage)</div>
                        <div class="kpi-value">${(defaultBudgetPerDay * 30 * dashboardData.clients.length).toLocaleString('de-DE')} Euro</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Durchschnittliche Kosten pro Bewerbung</div>
                        <div class="kpi-value">${calculateAvgCostPerApplicant().toFixed(2)} Euro</div>
                    </div>
                </div>

                <div class="section-title">Kosten pro Kampagne</div>
                <div class="cost-grid" id="costGrid"></div>
            `;

            container.innerHTML = html;
            renderCostGrid(defaultBudgetPerDay);
        }

        function saveBudgetSetting() {
            const budget = parseFloat(document.getElementById('budgetInput').value) || 20;
            costSettings.budgetPerDay = budget;
            saveLocalStorage();
            renderCostsTab(document.getElementById('contentArea'));
        }

        function renderCostGrid(budgetPerDay) {
            const costGrid = document.getElementById('costGrid');
            const monthlyData = dashboardData.monthlyBreakdown[dashboardData.monthlyBreakdown.length - 1]?.data || {};

            const costs = dashboardData.clients.map(funnel => {
                const monthlyApplicants = monthlyData[funnel] || getFilteredValue(dashboardData.thisMonth, funnel);
                const estimatedSpend = budgetPerDay * 30;
                const costPerApplicant = monthlyApplicants > 0 ? (estimatedSpend / monthlyApplicants).toFixed(2) : 'N/A';

                let rating = 'good';
                if (costPerApplicant !== 'N/A') {
                    if (costPerApplicant > 40) rating = 'bad';
                    else if (costPerApplicant > 25) rating = 'medium';
                }

                return { funnel, customer: dashboardData.customerMap[funnel] || funnel, estimatedSpend, costPerApplicant, monthlyApplicants, rating };
            }).sort((a, b) => parseFloat(a.costPerApplicant || 999) - parseFloat(b.costPerApplicant || 999));

            costGrid.innerHTML = costs.map(cost => `
                <div class="cost-card">
                    <div class="cost-header">
                        <div>
                            <div class="cost-campaign">${cost.customer}</div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${cost.funnel}</div>
                        </div>
                        <div class="cost-rating cost-${cost.rating}">
                            ${cost.rating === 'good' ? 'Gut' : cost.rating === 'medium' ? 'Mittel' : 'Schlecht'}
                        </div>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Bewerber (Monat)</span>
                        <span class="cost-value">${cost.monthlyApplicants}</span>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Geschaetztes Budget</span>
                        <span class="cost-value">${cost.estimatedSpend.toLocaleString('de-DE')} Euro</span>
                    </div>
                    <div class="cost-row">
                        <span class="cost-label">Kosten pro Bewerbung</span>
                        <span class="cost-value">${typeof cost.costPerApplicant === 'number' ? cost.costPerApplicant.toFixed(2) + ' Euro' : cost.costPerApplicant}</span>
                    </div>
                </div>
            `).join('');
        }

        function calculateAvgCostPerApplicant() {
            const totalMonthlyApplicants = dashboardData.monthlyBreakdown[dashboardData.monthlyBreakdown.length - 1]?.total || dashboardData.monthTotal || 1;
            const budgetPerDay = costSettings.budgetPerDay || 20;
            const totalBudget = budgetPerDay * 30 * dashboardData.clients.length;
            return totalBudget / totalMonthlyApplicants;
        }

        function renderInstructions(container) {
            const webhookUrl = `${window.location.origin}${window.location.pathname}?api=${encodeURIComponent(API_URL)}`;

            container.innerHTML = `
                <div class="instructions">
                    <div class="instruction-section">
                        <div class="instruction-title">Dashboard Konfiguration</div>
                        <div class="instruction-text">
                            Dieses Dashboard zeigt Echtzeit Daten aus Ihrem Meetovo Account und wird alle 5 Minuten aktualisiert.
                        </div>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Benutzerdefinierte API URL</div>
                        <div class="instruction-text">
                            Sie koennen eine benutzerdefinierte Google Apps Script URL ueber den URL Parameter "api" uebergeben:
                        </div>
                        <div class="code-block">${webhookUrl}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${webhookUrl}')">URL kopieren</button>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Kampagnen Verwaltung</div>
                        <div class="instruction-text">
                            Im Reiter "Kampagnen" koennen Sie den Status jeder Kampagne verwalten:
                        </div>
                        <ul style="list-style: none; margin: 10px 0; color: var(--text-secondary); font-size: 14px;">
                            <li style="margin: 8px 0;"><strong>Aktiv:</strong> Kampagne ist im Einsatz und wird ueberwacht</li>
                            <li style="margin: 8px 0;"><strong>Pausiert:</strong> Kampagne ist temporaer deaktiviert, loest keine Alarme aus</li>
                            <li style="margin: 8px 0;"><strong>Besetzt:</strong> Position ist besetzt, wird nicht ueberwacht</li>
                        </ul>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Kampagnen Alarm System</div>
                        <div class="instruction-text">
                            Das System warnt Sie automatisch, wenn eine Kampagne keine Bewerbungen erhaelt:
                        </div>
                        <ul style="list-style: none; margin: 10px 0; color: var(--text-secondary); font-size: 14px;">
                            <li style="margin: 8px 0;"><span style="color: var(--color-success);">Gruen:</span> Bewerbung innerhalb der letzten 3 Tage</li>
                            <li style="margin: 8px 0;"><span style="color: var(--color-warning);">Gelb:</span> 4 bis 7 Tage ohne Bewerbungen</li>
                            <li style="margin: 8px 0;"><span style="color: var(--color-danger);">Rot:</span> 7+ Tage ohne Bewerbungen</li>
                        </ul>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Kostenanalyse</div>
                        <div class="instruction-text">
                            Der Reiter "Kosten" zeigt die geschaetzten Kosten pro Kampagne basierend auf Ihrem Budget:
                        </div>
                        <ul style="list-style: none; margin: 10px 0; color: var(--text-secondary); font-size: 14px;">
                            <li style="margin: 8px 0;"><strong>Geschaetztes Budget:</strong> Tagesbudget x 30 Tage</li>
                            <li style="margin: 8px 0;"><strong>Kosten pro Bewerbung:</strong> Gesamtbudget geteilt durch Bewerber im Monat</li>
                            <li style="margin: 8px 0;"><strong>Rating:</strong> Basierend auf Kosten pro Bewerbung</li>
                        </ul>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Design und Voreinstellungen</div>
                        <div class="instruction-text">
                            Der Nachtmodus ist standardmaessig aktiviert. Sie koennen ihn durch Klicken auf "Tagesmodus" in der Seitenleiste aendern.
                            Alle Einstellungen werden automatisch gespeichert.
                        </div>
                    </div>

                    <div class="instruction-section">
                        <div class="instruction-title">Unterstuetzte Browser</div>
                        <div class="instruction-text">
                            Dieses Dashboard funktioniert am besten mit modernen Browsern:
                        </div>
                        <ul style="list-style: none; margin: 10px 0; color: var(--text-secondary); font-size: 14px;">
                            <li style="margin: 8px 0;">Chrome 90+</li>
                            <li style="margin: 8px 0;">Firefox 88+</li>
                            <li style="margin: 8px 0;">Safari 14+</li>
                            <li style="margin: 8px 0;">Edge 90+</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('URL in Zwischenablage kopiert!');
            });
        }

        function getFilteredValue(data, funnel) {
            if (!data) return 0;
            if (funnel) return data[funnel] || 0;
            if (!currentClient) return Object.values(data).reduce((a, b) => a + b, 0);
            return data[currentClient] || 0;
        }

        function getAlertsCount() {
            return calculateAlerts().length;
        }

        function getBestCampaign() {
            let best = null;
            let maxCount = 0;
            const monthData = dashboardData.thisMonth || {};

            Object.entries(monthData).forEach(([funnel, count]) => {
                if (count > maxCount) {
                    maxCount = count;
                    best = dashboardData.customerMap[funnel] || funnel;
                }
            });

            return best;
        }

        init();
    </script>
</body>
</html>
